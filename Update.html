<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Sync | V6 | claude.ai</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        window.Firebase = { initializeApp, getApps, getApp, getFirestore, doc, setDoc, getDoc, deleteDoc, getAuth, signInAnonymously, onAuthStateChanged };
        window.isFirebaseCoreLoaded = true;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mac-blue:#0A84FF; }
        body { font-family:'Inter','Noto Sans TC',sans-serif; background:#050505; color:#fff; min-height:100vh; overflow:hidden; -webkit-font-smoothing:antialiased; }
        .aura-bg { position:fixed; inset:0; background:radial-gradient(circle at 50% 50%, #081021 0%, #050505 100%); z-index:-1; }
        @keyframes rotate-orbit { from{transform:rotate(0deg);}to{transform:rotate(360deg);} }
        .racing-beam { position:absolute; inset:-6px; border-radius:50%; background:conic-gradient(from 0deg,transparent 40%,#0A84FF 80%,#ffffff 100%); mask:radial-gradient(transparent 65%,black 67%); -webkit-mask:radial-gradient(transparent 65%,black 67%); filter:blur(1.2px); pointer-events:none; }
        .animate-orbit { animation:rotate-orbit 3s linear infinite; }
        .mac-glass { background:rgba(15,15,17,0.95); backdrop-filter:blur(60px); border:1px solid rgba(255,255,255,0.12); }
        .mapping-input { background:rgb(55,65,81); width:140px; height:38px; text-align:center; border-radius:9999px; padding:0 1rem; font-size:1.125rem; font-weight:900; outline:none; color:rgb(103,232,249); border:none; box-shadow:0 20px 25px -5px rgba(0,0,0,0.1); transition:all 0.15s; }
        .mapping-input:focus { box-shadow:0 0 0 4px rgba(34,211,238,0.2); }
        .mac-checkbox { width:22px; height:22px; border-radius:6px; border:2.5px solid rgba(255,255,255,0.2); margin-right:18px; display:flex; align-items:center; justify-content:center; transition:all 0.2s ease; }
        .active .mac-checkbox { background:#60a5fa; border-color:#60a5fa; }
        .custom-scroll::-webkit-scrollbar { width:4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:10px; }
        .page-fade-in { animation:fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, memo, useCallback } = React;

/* ══════════════════════════════════════════════════════════
   CENTRAL CONFIG  ── 新增廳院 / 人員 / 班別只改這裡
   ══════════════════════════════════════════════════════════ */

// 廳院設定：新增廳院在此加一筆
const VENUES = [
    { id:'GT', color:'#FF2D55', masterBg:'#8B0000', excelRow: -4 },
    { id:'BB', color:'#00FFFF', masterBg:'#008B8B', excelRow: -3 },
    { id:'GP', color:'#32DE84', masterBg:'#006400', excelRow: -2 },
    // 範例：{ id:'MH', color:'#FFD60A', masterBg:'#7A6500', excelRow: -1 }
    // ⚠ 新增廳院時，Excel 模板也需對應新增一列節目名稱，並調整 EXCEL_NOTE_ROW_OFFSET
];
const VENUE_IDS = VENUES.map(v => v.id);
const VENUE_MAP = Object.fromEntries(VENUES.map(v => [v.id, v]));

// ST 代碼對應的廳院（ST = 同時上 GT + BB）
// 新增複合班別：在此加入，例如 { code:'ALL', venues:['GT','BB','GP'] }
const ST_ALIAS = [
    { code:'ST', venues:['GT','BB'] },
];
const ST_ALIAS_MAP = Object.fromEntries(ST_ALIAS.map(a => [a.code, a.venues]));

// Excel 備注列相對日期列的 offset（節目列佔完之後緊接的那列）
const EXCEL_NOTE_ROW_OFFSET = -1;

// 班別轉換：Excel 代碼 → 系統班別
// A/C/E → A班，B/D/F → B班
const SHIFT_MAP = { A:'A', B:'B', C:'A', D:'B', E:'A', F:'B' };

// 人員設定：gender M/F，type Normal/Special
const STAFF_ORDER = ["王志剛","張國飛","張劭如","謝祥玄","張懷德","楊淯舒","黎祐甄","廖俊龍","曾健洋","劉智敏"];
const STAFF_INFO = {
    "王志剛":{ gender:"M", type:"Normal"  }, "張國飛":{ gender:"M", type:"Normal"  },
    "張劭如":{ gender:"F", type:"Normal"  }, "謝祥玄":{ gender:"M", type:"Normal"  },
    "張懷德":{ gender:"M", type:"Normal"  }, "楊淯舒":{ gender:"F", type:"Normal"  },
    "黎祐甄":{ gender:"F", type:"Normal"  }, "廖俊龍":{ gender:"M", type:"Normal"  },
    "曾健洋":{ gender:"M", type:"Special" }, "劉智敏":{ gender:"M", type:"Special" },
};

// Excel 結構設定
const EXCEL_ROWS_START  = [4, 52, 100, 148, 196, 244];  // 每週日期列（0-indexed）
const EXCEL_COLS_INDEX  = [2, 5, 8, 11, 14, 17, 20];    // 每天所在欄（0-indexed）
const EXCEL_STAFF_RANGE = { start:2, end:30 };           // 相對日期列的人員列範圍（偶數步進）

/* ══════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = { apiKey:"AIzaSyAx2aYlfqHBUe3V7a3sT5ZPVNYyr2JY8OA", authDomain:"tpac-schedule.firebaseapp.com", projectId:"tpac-schedule", storageBucket:"tpac-schedule.firebasestorage.app", messagingSenderId:"70955835780", appId:"1:70955835780:web:9d3b0958738557d1f7fdd1" };
const APP_ID = "tpac-schedule";

/* ── 日期解析 ── */
const parseExcelDate = (cell) => {
    if (typeof cell === 'number') {
        const d = new Date(Math.round((cell-25569)*86400*1000));
        return `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;
    }
    if (typeof cell === 'string') {
        const m = cell.match(/(\d{1,2})\/(\d{1,2})/);
        if (m) {
            const now=new Date(), mm=parseInt(m[1]), dd=parseInt(m[2]);
            let y=now.getFullYear();
            if(now.getMonth()>=10&&mm<=2)y++; else if(now.getMonth()<=1&&mm>=11)y--;
            return `${y}/${mm.toString().padStart(2,'0')}/${dd.toString().padStart(2,'0')}`;
        }
    }
    return null;
};

/* ── Excel 解析核心（完全動態，依 VENUES / ST_ALIAS / STAFF_ORDER） ── */
const processSheetData = (sheet, existing) => {
    const rows = XLSX.utils.sheet_to_json(sheet, { header:1, defval:"" });
    let { fR, fS, fH, fN } = existing;

    EXCEL_ROWS_START.forEach(rS => {
        EXCEL_COLS_INDEX.forEach(cI => {
            const dateKey = parseExcelDate(rows[rS]?.[cI]);
            if (!dateKey) return;

            // 動態初始化廳院結構
            if (!fR[dateKey]) fR[dateKey] = Object.fromEntries(VENUE_IDS.map(id=>[id,{}]));
            if (!fS[dateKey]) fS[dateKey] = {};

            // 動態讀取各廳院節目名稱（依 VENUES 的 excelRow）
            fH[dateKey] = Object.fromEntries(
                VENUES.map(v => [v.id, (rows[rS + v.excelRow]?.[cI] || "").toString().trim()])
            );
            fN[dateKey] = (rows[rS + EXCEL_NOTE_ROW_OFFSET]?.[cI] || "").toString().trim();

            // 讀取人員班表
            for (let r=rS+EXCEL_STAFF_RANGE.start; r<=rS+EXCEL_STAFF_RANGE.end; r+=2) {
                const name = (rows[r]?.[1] || "").trim();
                if (!STAFF_ORDER.includes(name)) continue;
                const code = (rows[r+1]?.[cI] || "").toString().trim();

                // 休假類
                if (code==="" || code.match(/休|例|休息|無排班|公假|婚假|喪假|病假|事假|特休|補休/)) {
                    fS[dateKey][name] = "休假";
                    continue;
                }
                // 辦公類
                if (code.match(/辦公|支援|居家|其他|其它/)) {
                    fS[dateKey][name] = "辦公";
                    continue;
                }

                // 上班類：解析 venue-shift 格式（如 GT-A、BB-B、ST-A）
                // 支援所有 VENUE_IDS 及 ST_ALIAS 中定義的代碼
                const allCodes = [...VENUE_IDS, ...Object.keys(ST_ALIAS_MAP)].join('|');
                const match = code.match(new RegExp(`(${allCodes})-([A-F])`, 'i'));
                if (match) {
                    const vid = match[1].toUpperCase();
                    const sh  = SHIFT_MAP[match[2].toUpperCase()] || 'A';

                    if (ST_ALIAS_MAP[vid]) {
                        // 複合班別：同時寫入多個廳院
                        ST_ALIAS_MAP[vid].forEach(targetVid => {
                            if (!fR[dateKey][targetVid]) fR[dateKey][targetVid] = {};
                            fR[dateKey][targetVid][name] = { shift:sh };
                        });
                    } else {
                        // 一般班別
                        if (!fR[dateKey][vid]) fR[dateKey][vid] = {};
                        fR[dateKey][vid][name] = { shift:sh };
                    }
                    fS[dateKey][name] = "";
                } else {
                    // 無法解析的代碼，視為辦公
                    fS[dateKey][name] = "辦公";
                }
            }
        });
    });
    return { fR, fS, fH, fN };
};

/* ── 人員顯示顏色（依 STAFF_INFO） ── */
const staffDisplayColor = (name) => {
    const info = STAFF_INFO[name];
    if (!info) return "#D1FFFF";
    if (info.type==="Special") return "#FEFFD1";
    return info.gender==="F" ? "#FFCCFF" : "#D1FFFF";
};

/* ── Icons ── */
const Icon = memo(({name,className="w-4 h-4"})=>{
    const d = {
        cloud:  <path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.2-1.6-4-3.7-4.4-.5-3.1-3.2-5.6-6.3-5.6-2.5 0-4.7 1.5-5.7 3.6-2 .4-3.3 2.1-3.3 4.1C3 15.2 5.2 18 8 18h9.5z"/>,
        alias:  <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 8.5l-3.5 3.5L15 9"/></>,
        check:  <path d="M20 6 9 17l-5-5"/>,
        trash:  <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></>,
    };
    return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{d[name]}</svg>;
});

/* ── Success Screen ── */
const SuccessScreen = ({report,onBack}) => (
    <div className="h-screen w-screen flex flex-col items-center bg-[#050505] p-6 page-fade-in text-center overflow-y-auto relative z-50">
        <div className="aura-bg fixed inset-0"></div>
        <header className="w-full mt-10 mb-8 shrink-0"><h1 className="text-4xl font-black italic tracking-tighter uppercase leading-none">Uplink Success</h1></header>
        <main className="w-full max-w-lg flex-1 flex flex-col items-center justify-center">
            <div className="mac-glass rounded-[4rem] p-10 flex flex-col items-center border-white/10 shadow-2xl w-full">
                <div className="w-full bg-white/5 rounded-[3rem] p-8 border border-white/5 space-y-6 mb-8 shadow-inner">
                    <p className="text-[11px] font-black text-white/30 uppercase tracking-[0.3em]">雲端覆蓋跨度</p>
                    <p className="text-[#30D158] text-xl font-black">{report.start} ➔ {report.end}</p>
                    <div className="pt-6 border-t border-white/5 flex flex-wrap justify-center gap-2">
                        {report.sheets.map(s=><span key={s} className="bg-blue-600/30 text-blue-200 text-xs px-3 py-1 rounded-full border border-blue-500/20 font-black">{s}</span>)}
                    </div>
                    <div className="pt-6 border-t border-white/5"><p className="text-white text-base font-black">共注入 {report.total} 天班表</p></div>
                </div>
                <button onClick={onBack} className="w-full py-6 rounded-full bg-blue-600 font-black text-xs uppercase tracking-widest text-white shadow-xl hover:bg-blue-500 transition-colors">Back to Hub</button>
            </div>
        </main>
    </div>
);

/* ── Alias Modal（動態列出所有 STAFF_ORDER 人員） ── */
const AliasModal = ({show,onClose,mapping,setMapping,onSave}) => {
    if(!show)return null;
    return(
        <div className="fixed inset-0 z-[1000] flex items-center justify-center p-6" onClick={onClose}>
            <div className="absolute inset-0 bg-black/95 backdrop-blur-3xl"></div>
            <div className="mac-glass w-[95%] max-w-5xl rounded-[3rem] p-8 flex flex-col shadow-2xl relative border-white/10 max-h-[90vh] overflow-hidden" onClick={e=>e.stopPropagation()}>
                <h3 className="text-3xl font-black italic uppercase text-center mb-8 text-white">Alias Management</h3>
                <div className="flex-1 overflow-y-auto custom-scroll pr-2">
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {STAFF_ORDER.map(name=>{
                            const color = staffDisplayColor(name);
                            return(
                                <div key={name} className="flex items-center gap-4 p-2 bg-white/[0.02] border border-white/5 rounded-[1.8rem]">
                                    <div className="w-[56px] h-[56px] shrink-0 flex items-center justify-center rounded-[1.2rem] border font-black text-xl tracking-tighter shadow-lg bg-white/5" style={{color,borderColor:color}}>
                                        {name[0]}
                                    </div>
                                    <div className="flex-1 flex items-center justify-between px-2">
                                        <span className="text-lg font-bold opacity-80 text-white">{name}</span>
                                        <input type="text" className="mapping-input" placeholder="Alias..."
                                            value={mapping[name]||""} onChange={e=>setMapping({...mapping,[name]:e.target.value})}/>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
                <button onClick={onSave} className="mx-auto mt-6 px-12 py-4 bg-blue-600 rounded-full font-black text-xs uppercase tracking-widest shadow-xl text-white hover:bg-blue-500 transition-colors">Update Cloud Mapping</button>
            </div>
        </div>
    );
};

/* ── Sheet Picker Modal ── */
const SheetPicker = ({show,sheets,selected,setSelected,onConfirm,onClose}) => {
    if(!show)return null;
    return(
        <div className="fixed inset-0 z-[500] flex items-center justify-center p-6" onClick={onClose}>
            <div className="absolute inset-0 bg-black/95 backdrop-blur-3xl"></div>
            <div className="mac-glass w-full max-w-sm rounded-[3.5rem] p-8 flex flex-col shadow-2xl relative overflow-hidden text-center text-white max-h-[85vh]" onClick={e=>e.stopPropagation()}>
                <h3 className="text-xl font-black italic uppercase tracking-widest mb-6">Select Sheets</h3>
                <div className="flex-1 overflow-y-auto custom-scroll pr-1 border-t border-b border-white/5 py-4">
                    {sheets.map(name=>(
                        <div key={name} onClick={()=>setSelected(p=>p.includes(name)?p.filter(n=>n!==name):[...p,name])}
                             className="h-14 flex items-center justify-center cursor-pointer transition-all hover:bg-white/5 rounded-2xl mb-1 select-none">
                            <div className={`mac-checkbox ${selected.includes(name)?'active':''}`}>
                                {selected.includes(name)&&<Icon name="check" className="text-white w-3.5 h-3.5"/>}
                            </div>
                            <span className={`text-xl font-black tracking-tighter ${selected.includes(name)?'text-blue-500':'text-white/20'}`}>{name}</span>
                        </div>
                    ))}
                </div>
                <button onClick={onConfirm} disabled={selected.length===0}
                    className="w-full py-5 rounded-full bg-blue-600 mt-8 font-black text-xs uppercase tracking-widest text-white shadow-lg disabled:opacity-50 hover:bg-blue-500 transition-colors">
                    Push to Cloud
                </button>
            </div>
        </div>
    );
};

/* ── Main App ── */
const App = () => {
    const [db,setDb]=useState(null), [user,setUser]=useState(null), [status,setStatus]=useState('connecting');
    const [sheetNames,setSheetNames]=useState([]), [selectedSheets,setSelectedSheets]=useState([]), [wb,setWb]=useState(null);
    const [report,setReport]=useState(null), [nameMapping,setNameMapping]=useState({}), [showAlias,setShowAlias]=useState(false);
    const fileRef = useRef(null);

    useEffect(()=>{
        const t=setInterval(()=>{
            if(!window.isFirebaseCoreLoaded||!window.Firebase)return;
            clearInterval(t);
            try{
                const app=Firebase.getApps().length===0?Firebase.initializeApp(FIREBASE_CONFIG):Firebase.getApp();
                const auth=Firebase.getAuth(app), fs=Firebase.getFirestore(app);
                setDb(fs);
                Firebase.signInAnonymously(auth).then(()=>{
                    Firebase.onAuthStateChanged(auth,async u=>{
                        if(!u)return; setUser(u); setStatus('idle');
                        const s=await Firebase.getDoc(Firebase.doc(fs,'artifacts',APP_ID,'public','data','configs','name_mapping'));
                        if(s.exists())setNameMapping(s.data().maps||{});
                    });
                });
            }catch(e){setStatus('error');console.error(e);}
        },150);
        return()=>clearInterval(t);
    },[]);

    const onFileChange = useCallback(e=>{
        const file=e.target.files[0]; if(!file)return;
        const reader=new FileReader();
        reader.onload=evt=>{
            try{
                const workbook=XLSX.read(new Uint8Array(evt.target.result),{type:'array'});
                setWb(workbook);
                setSheetNames(workbook.SheetNames.filter(n=>!n.includes("設定")&&!n.includes("準則")));
                setSelectedSheets([]);
                setStatus('picking');
            }catch{alert("Excel 讀取失敗，請確認格式");}
        };
        reader.readAsArrayBuffer(file);
        e.target.value=null;
    },[]);

    const runSync = async () => {
        if(!selectedSheets.length||!db)return;
        setStatus('syncing');
        await new Promise(r=>setTimeout(r,100));
        try{
            const docRef=Firebase.doc(db,'artifacts',APP_ID,'public','data','rosters','master');
            let data={fR:{},fS:{},fH:{},fN:{}};
            selectedSheets.forEach(name=>{ data=processSheetData(wb.Sheets[name],data); });
            const {fR,fS,fH,fN}=data;
            const allK=Object.keys(fR).sort();
            if(!allK.length)throw new Error("無有效排班資料被提取");
            await Firebase.setDoc(docRef,{
                roster:JSON.stringify(fR), statuses:JSON.stringify(fS),
                shows:JSON.stringify(fH),  notes:JSON.stringify(fN),
                lastUpdated:new Date().toISOString()
            });
            setReport({total:allK.length,start:allK[0],end:allK[allK.length-1],sheets:selectedSheets});
            setStatus('success');
        }catch(e){alert("同步失敗: "+e.message);setStatus('idle');}
    };

    const saveMapping = async () => {
        try{
            await Firebase.setDoc(Firebase.doc(db,'artifacts',APP_ID,'public','data','configs','name_mapping'),{maps:nameMapping,updatedAt:new Date().toISOString()});
            setShowAlias(false); alert("馬甲更新完成");
        }catch{alert("儲存失敗");}
    };

    const wipeData = async () => {
        if(!confirm("⚠️ 確定清空雲端所有排班資料？"))return;
        await Firebase.deleteDoc(Firebase.doc(db,'artifacts',APP_ID,'public','data','rosters','master'));
        alert("雲端已清空"); setStatus('idle');
    };

    if(status==='success'&&report)return <SuccessScreen report={report} onBack={()=>setStatus('idle')}/>;

    return(
        <div className="h-screen w-screen bg-[#050505] text-white flex flex-col items-center justify-between p-10 relative overflow-hidden select-none">
            <div className="aura-bg"></div>
            <header className="w-full flex justify-between items-start z-40">
                <button onClick={()=>setShowAlias(true)} className="p-3 bg-white/5 border border-white/10 rounded-2xl active:scale-95 transition-all hover:bg-white/10" title="Alias Management">
                    <Icon name="alias" className="text-blue-400 w-5 h-5"/>
                </button>
                <div className="text-center">
                    <h1 className="text-4xl font-black italic tracking-tighter uppercase leading-none">Cloud Sync V6</h1>
                    <div className={`mt-4 px-4 py-1 rounded-full border text-[9px] font-black uppercase inline-flex items-center gap-2 ${user?'border-emerald-500/30 text-emerald-500':'border-blue-500/30 text-blue-500'}`}>
                        <span className={`w-1.5 h-1.5 rounded-full ${user?'bg-emerald-500 shadow-[0_0_10px_#30D158]':'bg-blue-500 animate-pulse'}`}></span>
                        {user?'LINK READY':'CONNECTING...'}
                    </div>
                </div>
                <button onClick={wipeData} className="p-3 bg-white/5 border border-white/10 rounded-2xl active:scale-95 transition-all hover:bg-rose-500/20" title="Wipe Cloud Data">
                    <Icon name="trash" className="text-rose-500 w-5 h-5"/>
                </button>
            </header>

            <main className="flex-1 flex flex-col items-center justify-center relative w-full z-10">
                <div onClick={()=>status==='idle'&&fileRef.current.click()}
                     className={`relative w-64 h-64 flex items-center justify-center transition-transform ${status==='idle'?'cursor-pointer active:scale-95 hover:scale-105':''}`}>
                    <div className="absolute inset-0 rounded-full border-4 border-white/5"></div>
                    <div className={`racing-beam ${status==='idle'||status==='syncing'?'animate-orbit':'hidden'}`}></div>
                    <div className="w-48 h-48 rounded-full flex items-center justify-center bg-white/5 border border-white/10 shadow-inner backdrop-blur-sm z-10">
                        {status==='syncing'||status==='connecting'
                            ? <div className="w-16 h-16 border-[5px] border-white/10 border-t-blue-500 rounded-full animate-spin"></div>
                            : <Icon name="cloud" className="w-32 h-32 text-[#CEE6FF] drop-shadow-[0_0_20px_rgba(10,132,255,0.4)]"/>
                        }
                    </div>
                </div>
                <p className="mt-12 text-[10px] font-black uppercase tracking-[0.6em] opacity-30 text-center select-none">Click core to upload</p>
            </main>

            <AliasModal show={showAlias} onClose={()=>setShowAlias(false)} mapping={nameMapping} setMapping={setNameMapping} onSave={saveMapping}/>
            <SheetPicker show={status==='picking'} sheets={sheetNames} selected={selectedSheets} setSelected={setSelectedSheets} onConfirm={runSync} onClose={()=>setStatus('idle')}/>

            <footer className="w-full shrink-0 text-center opacity-30 mt-6 font-black tracking-widest text-[8px] text-white">
                © 2026 TPAC SCHEDULE SYSTEM | V6 | 2026
            </footer>
            <input type="file" ref={fileRef} className="hidden" onChange={onFileChange} accept=".xlsx"/>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
