<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AV 迴路盒查詢 | V10.0 Omnibox</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        /* ── 核心色彩系統 ── */
        :root {
            --bg:          #000000;
            --card:        #151517; 
            --card-border: rgba(255, 255, 255, 0.12); 
            --blue:        #0A84FF;
            --blue-glow:   rgba(10, 132, 255, 0.25);
            --green:       #32D74B;
            
            --text-main:   #FFFFFF; 
            --text-sub:    #A1A1A8; 
            --text-mute:   #C7C7CC; 
            
            --border:      rgba(255,255,255,0.18); 
            --sep:         rgba(255,255,255,0.08); 
            --input-bg:    rgba(255,255,255,0.12); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg); color: var(--text-main);
            font-family: "SF Pro Display", "Inter", "-apple-system", sans-serif;
            min-height: 100vh; padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
            display: flex; flex-direction: column; align-items: center;
        }

        /* ── Header (極簡化) ── */
        .header {
            width: 100%; padding: 60px 16px 20px; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 100; text-align: center;
        }
        .header h1 {
            font-size: 28px; font-weight: 700; color: #FFFFFF;
            margin-bottom: 4px; letter-spacing: 0.02em;
        }
        .version-label {
            font-size: 11px; font-weight: 700; color: var(--blue);
            letter-spacing: 0.15em; margin-bottom: 24px; opacity: 0.9;
        }

        /* ── Omnibox 萬能搜尋框 ── */
        .search-group { display: flex; flex-direction: column; gap: 12px; max-width: 540px; margin: 0 auto; }
        .search-row { display: flex; gap: 8px; align-items: center; width: 100%; }
        
        .search-wrap { position: relative; flex: 1; }
        .search-wrap input {
            width: 100%; background: var(--input-bg); border: 1.5px solid transparent;
            border-radius: 16px; padding: 16px 18px; color: var(--text-main); font-size: 16px; 
            outline: none; transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
            box-shadow: inset 0 0 0 0.5px var(--border);
        }
        .search-wrap input:focus { 
            background: rgba(255,255,255,0.16); 
            border-color: var(--blue);
            box-shadow: 0 0 0 4px var(--blue-glow);
        }
        .search-wrap input::placeholder { color: rgba(255,255,255,0.45); font-weight: 400; }
        
        .icon-btn {
            width: 52px; height: 52px; background: var(--input-bg);
            border: 0.5px solid var(--border); border-radius: 16px;
            color: var(--text-sub); cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            transition: all 0.2s;
        }
        @media (hover: hover) { 
            .icon-btn:hover { border-color: var(--text-sub); color: var(--text-main); background: rgba(255,255,255,0.15); } 
            .sug-item:hover { background: rgba(255,255,255,0.08); } 
            .id-chip:hover { background: rgba(10, 132, 255, 0.2); border-color: var(--blue); } 
        }
        .icon-btn:active { background: rgba(255,255,255,0.25); transform: scale(0.94); }

        /* ── Chips & Results Wall ── */
        .id-chip { 
            background: rgba(255,255,255,0.08); border: 1px solid var(--border); 
            border-radius: 10px; padding: 10px 16px; font-size: 15px; font-weight: 600; 
            color: var(--text-main); cursor: pointer; transition: all 0.2s; 
            animation: fadeInScale 0.3s ease-out forwards; opacity: 0; transform: scale(0.95); 
        }
        .id-chip:active { transform: scale(0.92); background: var(--blue); color: var(--text-main); border-color: var(--blue); }
        @keyframes fadeInScale { to { opacity: 1; transform: scale(1); } }
        
        .result-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
        .result-meta { font-size: 13px; color: var(--text-sub); margin-top: 6px; font-weight: 500; }

        /* ── Suggestions ── */
        .suggestions { position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: rgba(28,28,30,0.98); border: 1px solid var(--card-border); border-radius: 16px; overflow-y: auto; max-height: 45vh; box-shadow: 0 12px 48px rgba(0,0,0,0.8); z-index: 200; display: none; }
        .sug-item { padding: 14px 16px; cursor: pointer; border-bottom: 0.5px solid var(--sep); display: flex; flex-direction: column; gap: 6px; }
        .sug-header { display: flex; justify-content: space-between; align-items: center; font-size: 16px; letter-spacing: 0.02em; }
        .sug-hall { font-size: 12px; font-weight: 700; padding: 3px 8px; border-radius: 8px; }
        .sug-loc { font-size: 13px; color: var(--text-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }

        /* ── Content & Card ── */
        .content { width: 100%; max-width: 540px; padding: 24px 16px 0; }
        .card { 
            background: var(--card); border: 1px solid var(--card-border); 
            border-radius: 20px; padding: 24px; margin-bottom: 16px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: fadeIn 0.3s ease-out; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        
        .tag { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; color: var(--blue); margin-bottom: 10px; }
        .id-label { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); }
        .divider { border: none; border-top: 1px solid var(--sep); margin: 18px 0; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .info-item .label { font-size: 13px; color: var(--text-sub); margin-bottom: 6px; font-weight: 500; }
        .info-item .value { font-size: 17px; font-weight: 600; line-height: 1.4; color: var(--text-main); }
        .hall-badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 999px; font-size: 16px; font-weight: 700; margin-right: 8px; }

        /* ── Table ── */
        .section-title { font-size: 12px; color: var(--text-sub); font-weight: 700; letter-spacing: 0.12em; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        thead th { 
            text-align: left; font-size: 13px; color: var(--text-sub); font-weight: 600; 
            padding: 0 4px 10px; border-bottom: 1px solid var(--border); letter-spacing: 0.05em; 
        }
        thead th:nth-child(1) { width: 55%; }
        thead th:nth-child(2) { width: 30%; }
        thead th:nth-child(3) { width: 15%; text-align: right; }
        
        tbody tr { border-bottom: 1px solid var(--sep); }
        tbody td { padding: 14px 4px; font-size: 16px; font-weight: 500; color: var(--text-main); vertical-align: top; word-wrap: break-word; }
        tbody td:last-child { text-align: right; font-size: 18px; font-weight: 600; color: var(--text-main); }
        
        .sys-name { font-weight: 600; color: var(--text-main); letter-spacing: 0.01em; line-height: 1.4; }
        .dest-info { font-size: 13px; color: var(--text-mute); margin-top: 6px; line-height: 1.4; display: flex; gap: 6px; }
        .dest-icon { color: var(--blue); flex-shrink: 0; font-weight: bold; }

        /* ── Settings & Placeholder ── */
        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .save-btn { background: var(--blue); color: var(--text-main); border: none; border-radius: 10px; padding: 8px 18px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .close-settings { background: rgba(255,255,255,0.1); color: var(--text-main); border: none; border-radius: 10px; width: 34px; height: 34px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .alias-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--sep); }
        .alias-orig { font-size: 14px; color: var(--text-mute); flex: 1; word-break: break-all; min-width: 0; line-height: 1.3; }
        .alias-row input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text-main); outline: none; font-size: 15px; min-width: 0; transition: border-color 0.2s; }
        .alias-row input:focus { border-color: var(--blue); }
        
        .placeholder { 
            text-align: center; padding: 100px 20px; color: var(--text-sub); 
            font-size: 15px; font-weight: 500; letter-spacing: 0.05em; line-height: 1.6;
        }
        .placeholder span { display: block; margin-top: 8px; font-size: 13px; opacity: 0.6; }
    </style>
</head>
<body>

<div class="header">
    <h1>音視訊迴路盒</h1>
    <div class="version-label">V10.0 OMNIBOX</div>
    
    <div class="search-group">
        <div class="search-row">
            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="輸入編號、廳院、線材 (如: GT 4F Twist)" autocomplete="off">
                <div id="suggestions" class="suggestions"></div>
            </div>
            <button class="icon-btn" id="clearBtn" title="清除">✕</button>
            <button class="icon-btn" id="settingBtn" title="設定">⚙️</button>
        </div>
    </div>
</div>

<div class="content">
    <div id="settingsArea" class="card" style="display:none; margin-bottom:16px;">
        <div class="settings-header">
            <span style="font-size:15px; font-weight:600; color:var(--blue);">🛠️ 自訂系統名稱 (Alias)</span>
            <div style="display:flex; gap:10px;">
                <button class="save-btn" id="saveBtn">儲存</button>
                <button class="close-settings" id="closeSettingBtn">✕</button>
            </div>
        </div>
        <div id="aliasList" style="max-height:400px; overflow-y:auto; padding-right:4px;"></div>
    </div>

    <div id="resultArea" style="display:none"></div>
    <div id="placeholder" class="placeholder">
        準備掃描 / 查詢
        <span>支援全域模糊搜尋與精準 ID 對接</span>
    </div>
</div>

<script>
const CONFIG = {
    DATA_URL: './data.json',
    STORAGE_KEY: 'avAliases',
    MAX_SUGGESTIONS: 15,
    HALL_MAP: {
        '大劇院':           { name: 'GT 大劇院',   short: 'GT', color: '#FF3B30' },
        '多形式中劇院':     { name: 'BB 藍盒子',   short: 'BB', color: '#5AC8FA' },
        '鏡框式中劇院':     { name: 'GP 球劇場',   short: 'GP', color: '#34C759' },
        '偶劇院':           { name: 'PT 偶劇院',   short: 'PT', color: '#FF9F0A' },
        '排練室':           { name: '排練室',      short: '練', color: '#64D2FF' },
        '屋頂劇場':         { name: 'RT 屋頂劇場', short: 'RT', color: '#BF5AF2' },
        '公共區域':         { name: '公共區域',    short: '公共', color: '#8E8E93' },
        '卸貨口與外部空間': { name: '外部空間',    short: '外部', color: '#636366' },
    }
};

let db = [];
let uniqueBoxes = []; 
let aliases = {};
let currentId = null;
let idSearchIndex = new Map();

const escHtml = s => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
const safeParse = (str, fb) => { try { return JSON.parse(str) || fb; } catch(e) { return fb; } };
const getEle = id => document.getElementById(id);
const escapeRegExp = s => String(s ?? '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
const normalizeForMatch = s => String(s ?? '').toUpperCase().replace(/[^A-Z0-9\u4E00-\u9FFF]/g, '');
const tokenizeQuery = q => String(q ?? '')
    .split(/[\s,，、;:\/\\|]+/)
    .map(t => normalizeForMatch(t))
    .filter(Boolean);

window.addEventListener('DOMContentLoaded', async () => {
    aliases = safeParse(localStorage.getItem(CONFIG.STORAGE_KEY), {});
    bindEvents();
    await loadData();
});

function normalizeSearchInput(rawVal) {
    let val = rawVal.trim().toUpperCase();
    if (!val) return '';
    if (/^\d{4}$/.test(val)) return `AV ${val.substring(0, 2)}-${val.substring(2)}`;
    if (/^\d{2}-\d{2}/.test(val)) return `AV ${val}`;
    val = val.replace(/^AV\s*/, 'AV ');
    val = val.replace(/^AV\s*(\d{2})(\d{2})/, 'AV $1-$2');
    return val;
}

function isIdLike(val) {
    return /^#\d+$/i.test(val) || /^AV\s*\d{2}-\d{2}(?:\.\d+)?$/i.test(val);
}

function buildSearchIndex() {
    const map = new Map();
    db.forEach(d => {
        const id = d.id;
        if (!id) return;
        const hall = d.hall || '';
        const hallShort = CONFIG.HALL_MAP[hall]?.short || '';
        const fields = [
            id, hall, hallShort,
            d._floor || '',
            d._exactLoc || d.loc || '',
            d.sys || '',
            aliases[d.sys] || '',
            d.dest || '',
            d.room || '',
            d.conn || '',
            d.rack || '',
            d.dev || ''
        ];
        const norm = normalizeForMatch(fields.join(' '));
        map.set(id, (map.get(id) || '') + norm);
    });
    idSearchIndex = map;
}

function fuzzyMatchIds(query) {
    const tokens = tokenizeQuery(query);
    if (!tokens.length) return [];
    return uniqueBoxes.filter(d => {
        const idx = idSearchIndex.get(d.id) || '';
        return tokens.every(t => idx.includes(t));
    });
}

function renderListResults(list, query) {
    currentId = null;
    const ids = list.map(d => d.id).sort((a,b) => a.localeCompare(b));
    if (!ids.length) return showPlaceholder('查無符合條件的迴路盒');
    const chips = ids.map((id, i) => 
        `<div class="id-chip" data-id="${escHtml(id)}" style="animation-delay:${i*0.015}s">${escHtml(id)}</div>`
    ).join('');
    getEle('resultArea').innerHTML = `
        <div class="card">
            <div class="tag">FUZZY MATCH / 全域搜尋結果</div>
            <div class="id-label" style="font-size:24px; color:var(--text-main);">${escHtml(query)}</div>
            <div class="result-meta">找到 ${ids.length} 筆相符資料（點選按鈕進入詳情）</div>
            <div class="result-chips">${chips}</div>
        </div>`;
    getEle('resultArea').style.display = 'block';
    getEle('placeholder').style.display = 'none';
}

function bindEvents() {
    const searchInput = getEle('searchInput');
    searchInput.addEventListener('input', handleMainInput);
    
    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const raw = searchInput.value.trim();
            if (!raw) return;

            getEle('suggestions').style.display = 'none';
            
            // 判斷是否為明確的 ID 導向
            const val = normalizeSearchInput(raw);
            if (isIdLike(val)) {
                // 確認資料庫真的有這個 ID，有的話直接打開
                const exists = uniqueBoxes.some(d => d.id === val);
                if (exists) return triggerSearch(val);
            }
            
            // 如果不是精準 ID，或者 ID 不存在，一律展開「搜尋結果牆」
            renderListResults(fuzzyMatchIds(raw), raw);
        }
    });

    getEle('clearBtn').addEventListener('click', () => { 
        getEle('searchInput').value = ''; 
        getEle('suggestions').style.display = 'none'; 
        showPlaceholder('準備掃描 / 查詢\\n<span>支援全域模糊搜尋與精準 ID 對接</span>'); 
    });
    
    getEle('settingBtn').addEventListener('click', () => getEle('settingsArea').style.display = getEle('settingsArea').style.display==='none'?'block':'none');
    getEle('closeSettingBtn').addEventListener('click', () => getEle('settingsArea').style.display = 'none');
    getEle('saveBtn').addEventListener('click', saveAliases);

    // 委派點擊事件 (處理選單點擊與結果牆按鈕點擊)
    document.addEventListener('click', e => {
        const sug = e.target.closest('.sug-item');
        if (sug && sug.dataset.id) {
            getEle('searchInput').value = sug.dataset.id;
            getEle('suggestions').style.display = 'none';
            return triggerSearch(sug.dataset.id);
        }

        const chip = e.target.closest('.id-chip');
        if (chip && chip.dataset.id) return triggerSearch(chip.dataset.id);

        if (!e.target.closest('.search-wrap')) getEle('suggestions').style.display = 'none';
    });
}

async function loadData() {
    try {
        const res = await fetch(`${CONFIG.DATA_URL}?v=${Date.now()}`);
        const rawDb = await res.json();
        
        db = rawDb.map(d => {
            let rawId = (d.id || '').trim().toUpperCase();
            let stdId = rawId.replace(/^AV\s*/, 'AV ');
            let floor = '';
            let exactLoc = (d.loc || '').trim();
            
            const floorMatch = exactLoc.match(/(?:^|[^a-zA-Z0-9])([B]?\d{1,2}[M]?F|RF)(?![a-zA-Z0-9])/i);
            
            if (floorMatch) {
                floor = floorMatch[1].toUpperCase();
                exactLoc = exactLoc.replace(floorMatch[1], '').replace(/^[-\s]+/, '').trim(); 
            } else {
                const roomMatch = exactLoc.match(/^0?(\d{1,2})\.\d{2}/);
                if (roomMatch) {
                    floor = roomMatch[1] + 'F';
                } else {
                    const idMatch = stdId.match(/^AV\s*(\d{1,2})([M]?)/i);
                    if (idMatch) floor = idMatch[1] + (idMatch[2].toUpperCase() === 'M' ? 'MF' : 'F');
                }
            }

            if (/0?5\s*[-_.]\s*6[1-6]/i.test(stdId)) floor = '5MF';
            if (floor) floor = floor.replace(/^(B?)0+(\d+.*)/, '$1$2');

            return { ...d, id: stdId, _floor: floor || '未知樓層', _exactLoc: exactLoc || '一般區域' };
        });

        const seenIds = new Set();
        uniqueBoxes = db.filter(d => {
            if (!d.id || seenIds.has(d.id)) return false;
            seenIds.add(d.id); return true;
        });

        buildAliasEditor();
        buildSearchIndex();
    } catch(e) { showPlaceholder('⚠️ 無法載入資料，請確認網路連線'); }
}

// 【V10 核心：智慧排序引擎】解決搜尋汙染，確保編號符合的排在最前面
function handleMainInput() {
    const raw = getEle('searchInput').value;
    if (!raw.trim()) return getEle('suggestions').style.display = 'none';

    let sugs = fuzzyMatchIds(raw);
    const cleanRaw = raw.replace(/[^A-Z0-9]/ig, '').toUpperCase();

    // 權重排序：編號本身包含關鍵字者優先
    sugs.sort((a, b) => {
        const aIdClean = a.id.replace(/[^A-Z0-9]/ig, '');
        const bIdClean = b.id.replace(/[^A-Z0-9]/ig, '');
        const aMatch = aIdClean.includes(cleanRaw);
        const bMatch = bIdClean.includes(cleanRaw);

        if (aMatch && !bMatch) return -1;
        if (!aMatch && bMatch) return 1;
        return a.id.localeCompare(b.id);
    });

    sugs = sugs.slice(0, CONFIG.MAX_SUGGESTIONS);
    
    if(!sugs.length) { getEle('suggestions').style.display = 'none'; return; }
    
    getEle('suggestions').innerHTML = sugs.map(d => {
        const hallInfo = CONFIG.HALL_MAP[d.hall] || { short: d.hall||'?', color: '#8E8E93' };
        const matches = db.filter(m => m.id === d.id);
        const uniqueLocs = [...new Set(matches.map(m => m.loc?.trim()).filter(Boolean))].join(' / ') || '未標示位置';

        return `<div class="sug-item" data-id="${escHtml(d.id)}">
            <div class="sug-header"><span style="font-weight:600; color:var(--text-main);">${escHtml(d.id)}</span><span class="sug-hall" style="background:${hallInfo.color}25; color:${hallInfo.color}">${escHtml(hallInfo.short)}</span></div>
            <div class="sug-loc">📍 ${escHtml(uniqueLocs)}</div>
        </div>`;
    }).join('');
    getEle('suggestions').style.display = 'block';
}

function renderResult(id) {
    if (!id) return;
    const matches = db.filter(d => d.id === id);
    if (!matches.length) return showPlaceholder('查無此編號');
    
    currentId = id; 
    const first = matches[0];
    const hallInfo = CONFIG.HALL_MAP[first.hall] || { name: first.hall || '—', short: '?', color: '#8E8E93' };

    const uniqueLocs = [...new Set(matches.map(d => d.loc?.trim()).filter(Boolean))].join(' / ') || '—';

    const groups = new Map();
    matches.forEach(d => {
        const sys = (d.sys && (aliases[d.sys] || d.sys)) || '未命名系統';
        const destInfo = [d.dest?.trim(), d.room?.trim()].filter(Boolean).join(' ') || '未標示目的地';
        const key = `${sys}§${d.conn||'—'}§${destInfo}`;
        if (!groups.has(key)) groups.set(key, { sys, conn: d.conn||'—', destInfo, qty: 0 });
        groups.get(key).qty += parseInt(d.qty, 10) || 0;
    });

    const rows = [...groups.values()].sort((a,b) => a.sys.localeCompare(b.sys,'zh-TW')).map(g => 
        `<tr><td><div class="sys-name">${escHtml(g.sys)}</div><div class="dest-info"><span class="dest-icon">↳</span> <span>${escHtml(g.destInfo)}</span></div></td>
        <td>${escHtml(g.conn)}</td><td>${g.qty||'0'}</td></tr>` 
    ).join('');

    getEle('resultArea').innerHTML = `
        <div class="card">
            <div class="tag">SYSTEM SCAN OK</div>
            <div class="id-label">${escHtml(first.id)}</div><hr class="divider">
            <div class="info-grid">
                <div class="info-item"><div class="label">廳別</div><div class="value"><span class="hall-badge" style="background:${hallInfo.color}25;color:${hallInfo.color}">${escHtml(hallInfo.short)}</span><span style="font-size:16px;font-weight:500; color:var(--text-main);">${escHtml(hallInfo.name)}</span></div></div>
                <div class="info-item"><div class="label">位置</div><div class="value" style="font-size:16px; word-break:break-word; color:var(--text-main);">${escHtml(uniqueLocs)}</div></div>
            </div>
        </div>
        <div class="card"><p class="section-title">接口清單 / INTERFACE LIST</p>
        <table><thead><tr><th>系統 / 目的地</th><th>接頭</th><th>數量</th></tr></thead><tbody>${rows}</tbody></table></div>`;
        
    getEle('resultArea').style.display = 'block'; getEle('placeholder').style.display = 'none';
}

function showPlaceholder(msg) { currentId = null; getEle('resultArea').style.display = 'none'; getEle('placeholder').style.display = 'block'; getEle('placeholder').innerHTML = msg; }

function buildAliasEditor() {
    const sysNames = [...new Set(db.map(d => d.sys).filter(Boolean))].sort();
    getEle('aliasList').innerHTML = sysNames.map(s => `
        <div class="alias-row">
            <span class="alias-orig">${escHtml(s)}</span>
            <input class="alias-input" data-orig="${encodeURIComponent(s)}" value="${escHtml(aliases[s]||'')}" placeholder="自訂">
        </div>`).join('');
}

function saveAliases() {
    const btn = getEle('saveBtn');
    document.querySelectorAll('.alias-input').forEach(el => { 
        const v = el.value.trim(); 
        const orig = decodeURIComponent(el.dataset.orig); 
        if(v) aliases[orig] = v; else delete aliases[orig]; 
    });
    
    try {
        localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(aliases));
        buildSearchIndex();
        btn.innerText = '✅ 已儲存'; 
        btn.style.background = 'var(--green)';
        setTimeout(() => { btn.innerText = '儲存'; btn.style.background = 'var(--blue)'; getEle('settingsArea').style.display = 'none'; }, 800);
        if(currentId) renderResult(currentId); 
    } catch(e) { alert('儲存失敗：請確認是否開啟了無痕模式，或裝置儲存空間已滿。'); }
}
</script>
</body>
</html>
