<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>視聽班表系統 | V17.0 (Architect Edition)</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            future: { hoverOnlyWhenSupported: true },
            theme: { extend: {} }
        }
    </script>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        window.Firebase = { initializeApp, getApps, getApp, getFirestore, doc, onSnapshot, getDoc, getAuth, signInAnonymously, onAuthStateChanged };
    </script>
    
    <script>
        window.addEventListener("error", e => console.error("GlobalError:", e.message, "at", e.filename, e.lineno));
        window.addEventListener("unhandledrejection", e => console.error("PromiseError:", e.reason));
        
        window.SafeStorage = {
            set: (key, value) => { try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch(err) { return false; } },
            get: (key, def) => { try { const val = localStorage.getItem(key); return val ? JSON.parse(val) : (def !== undefined ? def : null); } catch(err) { return def; } }
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        :root {
            --bg-base: #0c0c0e; 
            --glass-nav: rgba(14,14,16,0.88); --glass-modal: rgba(20,20,23,0.97);
            --glass-card: rgba(255,255,255,0.038); --glass-card-hover: rgba(255,255,255,0.065);
            --glass-inset: rgba(0,0,0,0.28);
            --border-dim: rgba(255,255,255,0.07); --border-mid: rgba(255,255,255,0.11);
            --blue: #0A84FF; --pink: #FF375F; --orange: #FF9F0A; 
            --women-text: #FFD6E0; --men-text: #D0ECFF; --special-text: #FFF2CC;
            --women-dot: #FF375F; --men-dot: #5AC8FA; --special-dot:#FFD60A;
            --font: 'Plus Jakarta Sans','Noto Sans TC',system-ui,sans-serif;
            --r-xs: 8px; --r-sm: 12px; --r-md: 18px; --r-lg: 24px; --r-xl: 30px; --r-2xl: 36px;
        }

        body {
            font-family: var(--font); height: 100vh; overflow: hidden;
            background: var(--bg-base); color: rgba(255,255,255,0.92);
            -webkit-font-smoothing: antialiased; letter-spacing: -0.018em;
        }

        .aura-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 55% 40% at 8% -5%, rgba(10,132,255,0.11) 0%, transparent 100%),
                radial-gradient(ellipse 45% 35% at 92% 105%, rgba(255,55,95,0.07) 0%, transparent 100%),
                radial-gradient(ellipse 80% 70% at 50% 50%, rgba(16,16,20,0.6) 0%, transparent 100%);
        }

        .mac-glass {
            background: var(--glass-nav); backdrop-filter: blur(48px) saturate(180%);
            -webkit-backdrop-filter: blur(48px) saturate(180%); border-bottom: 1px solid var(--border-dim);
            box-shadow: 0 1px 0 rgba(255,255,255,0.04);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .weekend-bg { background: rgba(255,55,95,0.04) !important; }

        @keyframes b-badge-pulse {
            0%, 100% { border-color: rgba(255,255,255,0.3); box-shadow: 0 0 0 rgba(255,255,255,0); }
            50% { border-color: #FFFFFF; box-shadow: 0 0 12px rgba(255,255,255,0.6), inset 0 0 4px rgba(255,255,255,0.3); }
        }
        .b-badge-glow { animation: b-badge-pulse 3s infinite ease-in-out; border-width: 2px !important; }

        @keyframes b-row-glow-anim {
            0%, 100% { border-color: rgba(255,255,255,0.15); box-shadow: 0 0 0 rgba(255,255,255,0); }
            50% { border-color: #FFFFFF; box-shadow: 0 0 14px rgba(255,255,255,0.9), inset 0 0 4px rgba(255,255,255,0.5); }
        }
        .b-row-glow { 
            border-width: 2px !important; 
            border-style: solid !important; 
            animation: b-row-glow-anim 3s infinite ease-in-out; 
            position: relative; 
            z-index: 10; 
        }

        @keyframes window-spring {
            0%   { opacity: 0; transform: scale(0.96) translateY(14px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-window { animation: window-spring 0.28s cubic-bezier(0.16,1,0.3,1) forwards; }

        .master-left-col { position: absolute; left: 0; top: 0; bottom: 0; width: 88px; z-index: 50; background: rgba(12,12,14,0.99); border-right: 1px solid var(--border-mid); display: flex; flex-direction: column; }
        .master-right { margin-left: 88px; overflow-x: auto; overflow-y: hidden; display: block; }
        .master-cell  { min-width: 82px; flex-shrink: 0; text-align: center; border-left: 1px solid rgba(255,255,255,0.04); }
        .master-hdr   { height: 52px; }
        .master-row   { height: 50px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.045); }

        .day-block { background: var(--glass-card); border: 1px solid var(--border-dim); border-radius: var(--r-lg); padding: 14px 15px; margin-bottom: 10px; box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 3px 14px rgba(0,0,0,0.22); }
        
        .mq-wrap { overflow: hidden; white-space: nowrap; position: relative; width: 100%; }
        .mq-run { display: inline-block; padding-left: 0; animation: mq 16s linear infinite; }
        @keyframes mq { 0%, 15% { transform: translateX(0); } 85%, 100% { transform: translateX(-100%); } }
        @media (hover: hover) { .mq-wrap:hover .mq-run { animation-play-state: paused; } }

        @keyframes reminder-pulse { 0%,100% { border-color: rgba(255,55,95,0.22); } 50% { border-color: rgba(255,55,95,0.75); } }
        .reminder-glow { animation: reminder-pulse 3s infinite ease-in-out; }

        .wk-GT  { background: rgba(255,69,58,0.07) !important; border-color: rgba(255,69,58,0.20) !important; }
        .wk-BB  { background: rgba(29,158,255,0.07) !important; border-color: rgba(29,158,255,0.20) !important; }
        .wk-GP  { background: rgba(50,215,75,0.07) !important; border-color: rgba(50,215,75,0.20) !important; }
        .wk-off { background: rgba(255,55,95,0.04) !important; border-color: rgba(255,55,95,0.12) !important; }

        .day-block-today { background: rgba(10, 132, 255, 0.16) !important; border: 1px solid #0A84FF !important; box-shadow: 0 0 30px rgba(10, 132, 255, 0.5), 0 1px 0 rgba(255, 255, 255, 0.2) inset !important; position: relative; z-index: 10; }
        .master-today { background: rgba(10,132,255,0.13) !important; border-left: 1.5px solid rgba(10,132,255,0.55) !important; border-right: 1.5px solid rgba(10,132,255,0.55) !important; z-index: 10; position: relative; }

        [data-tip] { position: relative; }
        @media (hover: hover) and (pointer: fine) {
            [data-tip]:hover::after { content: attr(data-tip); position: absolute; top: 120%; left: 50%; transform: translateX(-50%); background: rgba(28,28,32,0.97); color: rgba(255,255,255,0.88); border: 1px solid var(--border-mid); padding: 5px 11px; border-radius: var(--r-xs); font-size: 11px; font-weight: 600; white-space: nowrap; z-index: 10000; pointer-events: none; backdrop-filter: blur(16px); box-shadow: 0 6px 22px rgba(0,0,0,0.55); animation: tip-fade 0.12s ease-out forwards; }
        }
        @keyframes tip-fade { from { opacity:0; transform:translateX(-50%) translateY(-4px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, memo, useCallback, useRef } = React;

/* =========================================================================
   1. CENTRAL CONFIG (整合所有硬編碼與正則表達式)
   ========================================================================= */
const CONFIG = {
    APP_VERSION: 'V17.0',
    APP_ID: "team-schedule-viewer",
    FIREBASE: { apiKey: "AIzaSyA7tgFRxDCnZpOzEvfT978wIAcqcXNZXVQ", authDomain: "team-schedule-viewer.firebaseapp.com", projectId: "team-schedule-viewer", storageBucket: "team-schedule-viewer.firebasestorage.app", messagingSenderId: "202883367260", appId: "1:202883367260:web:b31e495084a4ea8af20199" },
    VENUES: [ 
        { id:'GT', color:'#FF453A', masterBg:'255,69,58' }, 
        { id:'BB', color:'#1D9EFF', masterBg:'29,158,255' }, 
        { id:'GP', color:'#32D74B', masterBg:'50,215,75' } 
    ],
    SHIFTS: ['A', 'B'],
    STAFF_ORDER: ["王志剛","張國飛","張劭如","謝祥玄","張懷德","楊淯舒","黎祐甄","廖俊龍","曾健洋","劉智敏"],
    STAFF_INFO: { 
        "王志剛":{ gender:"M", type:"Normal" }, "張國飛":{ gender:"M", type:"Normal" }, 
        "張劭如":{ gender:"F", type:"Normal" }, "謝祥玄":{ gender:"M", type:"Normal" }, 
        "張懷德":{ gender:"M", type:"Normal" }, "楊淯舒":{ gender:"F", type:"Normal" }, 
        "黎祐甄":{ gender:"F", type:"Normal" }, "廖俊龍":{ gender:"M", type:"Normal", defaultAlias: "阿龍" },
        "曾健洋":{ gender:"M", type:"Special" }, "劉智敏":{ gender:"M", type:"Special" } 
    },
    SYNC_FEEDBACK_MS: 700,
    // 【新功能】國定假日清單 (每年底由排班人員在此維護，此為 2026 示意範例)
    HOLIDAYS: new Set([
        "2026/01/01", "2026/01/02", // 元旦連假
        "2026/02/16", "2026/02/17", "2026/02/18", "2026/02/19", "2026/02/20", // 農曆春節
        "2026/03/02", // 228補假
        "2026/04/03", "2026/04/06", // 兒童清明連假
        "2026/05/01", // 勞動節
        "2026/06/19", // 端午節連假
        "2026/09/25", // 中秋節連假
        "2026/10/09"  // 國慶補假
    ]),
    REGEX: {
        LEAVE: /休|例|假/,
        OFFICE: /辦公|支援|居家|其他|其它/
    }
};
const VENUE_IDS = CONFIG.VENUES.map(v => v.id);
const VENUE_MAP = Object.fromEntries(CONFIG.VENUES.map(v => [v.id, v]));

/* =========================================================================
   2. HELPER FUNCTIONS (防禦性工具函式)
   ========================================================================= */
const safeParse = (v, def = {}) => { if (v && typeof v === 'object') return v; try { return JSON.parse(v || JSON.stringify(def)); } catch(e) { return def; } };

const formatK = d => `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
const parseK = k => { 
    if(!k || typeof k !== 'string') return new Date();
    const [y,m,d] = k.split('/').map(Number); 
    return new Date(y, m-1, d); 
};
const getStaffColors = info => info?.type==="Special" ? { text:"text-[var(--special-text)]", dot:"bg-[var(--special-dot)]" } : info?.gender==="F" ? { text:"text-[var(--women-text)]", dot:"bg-[var(--women-dot)]" } : { text:"text-[var(--men-text)]", dot:"bg-[var(--men-dot)]" };

// 【新功能】提醒事項智慧轉換 (將 1. 變成 ➊，並加上【時間】框)
const formatNoteText = (text, isMobile = false) => {
    if (!text) return "";
    const circles = ['','➊','➋','➌','➍','➎','➏','➐','➑','➒','➓','⓫','⓬','⓭','⓮','⓯','⓰','⓱','⓲','⓳','⓴'];
    let formatted = text.replace(/(^|\s)(\d+)[.、]\s*(\d{1,2}:\d{2})/g, (m, p1, p2, p3) => {
        const n = parseInt(p2, 10);
        const badge = (n > 0 && n <= 20) ? circles[n] : p2 + '.';
        return `${p1}${badge} 【${p3}】 `;
    });
    if (isMobile) {
        // 手機版：遇到連續空白，或下一個字元是編號/圓圈數字時，強制斷行
        formatted = formatted.replace(/(?:\s{2,}|\s+(?=\d+[.、]|[➊-⓴]))/g, '\n');
    }
    return formatted;
};

/* =========================================================================
   2.1 AUTO DAY ROLLOVER (跨日自動刷新)
   ========================================================================= */
(() => {
    const getDayKey = () => formatK(new Date());
    let loadedKey = getDayKey();
    const checkAndReload = () => {
        const currentKey = getDayKey();
        if (currentKey !== loadedKey) { loadedKey = currentKey; window.location.reload(); }
    };
    setInterval(checkAndReload, 3600000);
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') checkAndReload(); });
    window.addEventListener('focus', checkAndReload);
})();

/* =========================================================================
   3. COMPONENTS
   ========================================================================= */
const Icon = memo(({ name, className="w-4 h-4" }) => {
    const icons = {
        info:    <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
        sun:     <path d="M12 2v2m0 16v2m10-10h-2M4 12H2m15.364-7.364-1.414 1.414M7.05 16.95l-1.414 1.414M16.95 16.95l1.414 1.414M5.636 5.636l1.414 1.414M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>,
        brief:   <><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>,
        cal:     <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
        today:   <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="12" cy="16" r="1.2"/></>,
    };
    return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
});

const ActionBtn = memo(({ onClick, tip, icon, active = false }) => (
    <button onClick={onClick} data-tip={tip} className={`w-8 h-8 rounded-full border flex items-center justify-center transition-all shrink-0 ${active ? 'bg-[var(--blue)] border-blue-400 text-white' : 'bg-white/[0.05] border-[var(--border-dim)] text-white/50 hover:bg-white/10 hover:text-white/80'}`}>
        <Icon name={icon} />
    </button>
));

const StaffBtn = memo(({ name, aliasMap={}, onClick, mode="normal" }) => {
    const info = CONFIG.STAFF_INFO[name] || { gender:'M', type:'Normal' };
    const { text, dot } = getStaffColors(info);
    const disp = aliasMap[name] || info.defaultAlias || name;
    const isLong = disp.length >= 3;
    const sz = mode==="tiny" ? "text-[14px] h-9" : mode==="small" ? `${isLong?"text-[14px]":"text-[16px]"} h-9` : mode==="master" ? "text-[16px] h-9" : `${isLong?"text-[20px]":"text-[22px]"} h-12`;
    return ( 
        <button onClick={e=>{e.stopPropagation();onClick?.(name);}} className={`w-full ${sz} rounded-[var(--r-sm)] font-semibold border border-[var(--border-dim)] bg-[var(--glass-card)] flex items-center justify-center gap-1.5 ${text} truncate shrink-0 transition-all duration-150 hover:bg-[var(--glass-card-hover)] hover:border-[var(--border-mid)] active:scale-[0.97]`}> 
            <span className={`w-1.5 h-1.5 rounded-full ${dot}`}></span>{disp} 
        </button> 
    );
});

/* --- Modals --- */
const CalendarPicker = memo(({ allDates, onSelect, onClose, calMonth, setCalMonth }) => {
    const dateSet = useMemo(()=>new Set(allDates.map(d=>d.fullKey)),[allDates]);
    const {y,m} = calMonth, firstDay = new Date(y,m,1).getDay(), daysInMonth = new Date(y,m+1,0).getDate(), todayK = formatK(new Date()), cells = []; 
    for(let i=0;i<firstDay;i++) cells.push(null); for(let d=1;d<=daysInMonth;d++) cells.push(d);
    return ( <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-black/40 backdrop-blur-md" onClick={onClose}> <div className="animate-window bg-[rgba(18,18,22,0.96)] border border-[var(--border-mid)] rounded-[var(--r-xl)] shadow-2xl w-full max-w-[280px] p-5" onClick={e=>e.stopPropagation()}> <div className="flex items-center justify-between mb-4"> <button onClick={()=>setCalMonth(p=>p.m===0?{y:p.y-1,m:11}:{y:p.y,m:p.m-1})} className="text-xl px-2 py-1">‹</button> <span className="text-[15px] font-bold">{y} 年 {m+1} 月</span> <button onClick={()=>setCalMonth(p=>p.m===11?{y:p.y+1,m:0}:{y:p.y,m:p.m+1})} className="text-xl px-2 py-1">›</button> </div> <div className="grid grid-cols-7 gap-y-1.5 gap-x-1"> {['日','一','二','三','四','五','六'].map(w=>(<div key={w} className="text-center text-[10.5px] font-semibold text-white/28 tracking-wide">{w}</div>))} {cells.map((d,i)=>{ if(!d) return <div key={"e"+i}/>; const fk=`${y}/${String(m+1).padStart(2,'0')}/${String(d).padStart(2,'0')}`, has=dateSet.has(fk), isToday=fk===todayK, isWk=(firstDay+d-1)%7===0||(firstDay+d-1)%7===6 || CONFIG.HOLIDAYS.has(fk); return ( <button key={fk} disabled={!has} onClick={()=>onSelect(fk)} className={`h-8 w-full rounded-full text-[13px] flex items-center justify-center transition-all ${isToday?'bg-[var(--blue)] text-white':has?(isWk?'text-rose-400 hover:bg-white/10':'text-white hover:bg-white/10'):'text-white/12 cursor-default'}`}>{d}</button> ); })} </div> </div> </div> );
});

const NotesModal = memo(({ onClose, visibleDates, schedule, goDate, handleBackToday }) => {
    const today = new Date(); today.setHours(0,0,0,0);
    const notesList = visibleDates.filter(d => schedule?.notes?.[d.fullKey]?.trim());
    return ( <div className="fixed inset-0 z-[3000] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm" onClick={onClose}> <div className="animate-window bg-[var(--glass-modal)] border border-[var(--border-mid)] w-full max-w-md rounded-[var(--r-2xl)] flex flex-col max-h-[85vh] overflow-hidden" onClick={e=>e.stopPropagation()}> <div className="p-3 border-b border-[var(--border-dim)] bg-white/[0.03] flex items-center justify-between"> <button onClick={onClose} className="w-8 h-8 rounded-full bg-white/[0.07] border border-[var(--border-mid)] text-white/55 hover:bg-white/15 hover:text-white/90 transition-all flex items-center justify-center text-[18px] leading-none">×</button> <h3 className="text-[16px] font-bold text-[var(--pink)]">重要提醒</h3> <ActionBtn onClick={handleBackToday} icon="today" tip="回到今天"/> </div> <div id="notes-scroll-container" className="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar scroll-smooth"> {notesList.length===0 ? ( <div className="text-center text-white/40 py-10">無任何提醒事項</div> ) : notesList.map(d=>( <button key={d.fullKey} id={`note-${d.fullKey}`} onClick={() => { onClose(); setTimeout(() => requestAnimationFrame(() => goDate(d.absIdx, d.fullKey)), 100); }} className={`w-full text-left p-3.5 rounded-2xl border transition-all ${parseK(d.fullKey)<today?'bg-white/[0.02] border-white/5 opacity-60':'bg-[rgba(255,55,95,0.08)] border-[rgba(255,55,95,0.2)]'}`}> <div className="text-[12px] font-bold">{d.fullKey} (週{d.w})</div> <div className="text-[14.5px] font-medium leading-relaxed whitespace-pre-wrap"><span className="md:hidden">{formatNoteText(schedule?.notes?.[d.fullKey], true)}</span><span className="hidden md:inline">{formatNoteText(schedule?.notes?.[d.fullKey], false)}</span></div> </button> ))} </div> </div> </div> );
});

const MasterRosterModal = memo(({ onClose, visibleDates, schedule, aliasMap, todayK, handleStaffClick, handleBackToday, openCal }) => {
    const [detail, setDetail] = useState(null);
    useEffect(() => {
        if(!detail) return;
        const onKeyDown = e => { if(e.key === 'Escape'){ e.stopPropagation(); setDetail(null); } };
        document.addEventListener('keydown', onKeyDown);
        return () => document.removeEventListener('keydown', onKeyDown);
    }, [detail]);

636366";} const sn=hasS?(schedule?.shows?.[d.fullKey]?.[activeV]||""):""; const isBShift=activeSh==='B'; if (filterMode && !(isBShift || (hasS && isW))) return null; return ( <div key={d.fullKey} id={`mrow-${d.fullKey}`} className={`flex items-center gap-4 day-block ${isS?'day-block-today':''} ${isW?(hasS?`wk-${activeV}`:'wk-off'):''}`}> <div className="flex flex-col border-r border-white/10 pr-3 w-[72px]"> <span className={`text-[10px] font-semibold tracking-wide ${isW?'text-[var(--pink)]':'text-white/30'}`}>週{d.w}</span> <span className={`text-[21px] font-extrabold tabular-nums ${isW?'text-[var(--pink)]':'text-white/88'}`}>{d.d}</span> </div> <div className="flex-1 mq-wrap text-[16px] font-medium opacity-60 italic"> <span className={sn.length>10?"mq-run":""}>{sn}</span> </div> <button onClick={()=>{ if(hasS){ setPrevStaff(queryStaff); setQueryVenue(activeV); } }} className={`text-[15px] font-bold px-3.5 py-1.5 rounded-xl shrink-0 transition-all ${isBShift?'b-badge-glow':''} ${hasS?'cursor-pointer hover:opacity-80 active:scale-95':'cursor-default'}`} style={{background:stColors.length>1?`linear-gradient(90deg, ${VENUE_MAP[stLabels[0].split('-')[0]]?.color}55 0%, ${VENUE_MAP[stLabels[stLabels.length-1].split('-')[0]]?.color}55 100%)`:undefined,backgroundColor:stColors.length>1?undefined:`${co}45`,border:stColors.length>1?'1.5px solid rgba(255,255,255,0.3)':`1.5px solid ${co}99`}}> {stColors.length>1 ? <span style={{color:'#FFF', letterSpacing:'0.03em'}}>{st}</span> : st} </button> </div> ); })} </div> </div> </div> ); });

/* =========================================================================
   4. MAIN APP ENTRY
   ========================================================================= */
const App = () => {
    const [allDates,setAllDates] = useState([]), [schedule,setSchedule] = useState({roster:{},statuses:{},shows:{},notes:{}});
    const [aliasMap,setAliasMap] = useState({}), [lastUpdated,setLastUpdated] = useState(""), [isRecentlyUpdated,setIsRecentlyUpdated] = useState(false);
    const [isUnlocked,setIsUnlocked] = useState(false), [errorMsg,setErrorMsg] = useState(null), [isRefreshing,setIsRefreshing] = useState(false);
    const [user,setUser] = useState(null), [dateIdx,setDateIdx] = useState(0), [activeModal,setActiveModal] = useState(null), [prevModal, setPrevModal] = useState(null), [queryTarget,setQueryTarget] = useState(null);
    const [calMonth,setCalMonth] = useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()};});
    
    const scrollTimeoutsRef = useRef({});
    useEffect(() => { return () => Object.values(scrollTimeoutsRef.current).forEach(clearTimeout); }, []);

    const markUpdateSeen = useCallback(()=>{ 
        if(!isRecentlyUpdated || !lastUpdated) return; 
        window.SafeStorage.set('tpac_seen_update', lastUpdated); 
        setIsRecentlyUpdated(false); 
    },[isRecentlyUpdated, lastUpdated]);
    
    const formatLastUpdated = useCallback(v => {
        const d = (v && typeof v.toDate === 'function') ? v.toDate() : new Date(v);
        if(!d || Number.isNaN(d.getTime())) return "";
        return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }, []);
    
    const visibleDates = useMemo(()=>{ 
        if(!allDates.length) return []; 
        const start=Math.max(0,dateIdx-7), end=Math.min(allDates.length,dateIdx+61); 
        return allDates.slice(start,end); 
    },[allDates,dateIdx]);

    const scrollTo = useCallback((fk,cid)=>{ 
        if(scrollTimeoutsRef.current[cid]) clearTimeout(scrollTimeoutsRef.current[cid]);
        scrollTimeoutsRef.current[cid] = setTimeout(() => {
            requestAnimationFrame(()=>{ 
                const container = document.getElementById(cid); if(!container) return; 
                const idMap={ "nav-scroll-container":`nav-${fk}`, "master-scroll-container":`mnav-${fk}`, "notes-scroll-container":`note-${fk}`, "venue-scroll-container":`vrow-${fk}`, "staff-scroll-container":`mrow-${fk}` }; 
                const el=document.getElementById(idMap[cid]||`mrow-${fk}`); if(!el) return; 
                
                if(cid==="nav-scroll-container" || cid==="master-scroll-container"){ 
                    const left = cid==="master-scroll-container" ? el.offsetLeft : el.offsetLeft - container.offsetWidth/2 + el.offsetWidth/2; 
                    container.scrollTo({ left, behavior:'smooth' }); 
                } else { 
                    container.scrollTo({ top: el.offsetTop - container.offsetHeight/2 + el.offsetHeight/2, behavior:'smooth' }); 
                } 
            });
        }, 100); 
    },[]);

    const allScrollTo = useCallback(fk=>{ ["nav-scroll-container","master-scroll-container","venue-scroll-container","staff-scroll-container","notes-scroll-container"].forEach(id=>scrollTo(fk,id)); },[scrollTo]);
    const goDate = useCallback((absIdx,fk)=>{ setDateIdx(absIdx); allScrollTo(fk); },[allScrollTo]);
    const handleBackToday = useCallback(()=>{ const tK=formatK(new Date()), i=allDates.findIndex(d=>d.fullKey===tK); if(i!==-1) goDate(i,tK); },[allDates,goDate]);
    const openCal = useCallback(()=>{ setPrevModal(activeModal); if(allDates[dateIdx]){ const d = parseK(allDates[dateIdx].fullKey); setCalMonth({y:d.getFullYear(), m:d.getMonth()}); } setActiveModal('calendar'); },[activeModal, allDates, dateIdx]);
    
    const swipeRef = useRef({});
    const activeDateIdxRef = useRef(dateIdx);
    const activeModalRef = useRef(activeModal);
    const selectedDateKeyRef = useRef(null);
    const hasInitializedSnapshotRef = useRef(false);
    useEffect(()=>{ activeDateIdxRef.current = dateIdx; },[dateIdx]);
    useEffect(()=>{ activeModalRef.current = activeModal; },[activeModal]);
    useEffect(()=>{ selectedDateKeyRef.current = allDates[dateIdx]?.fullKey || null; },[allDates, dateIdx]);
    
    useEffect(()=>{
        const onStart = e => {
            const nav = document.getElementById('nav-scroll-container');
            const inNav = nav && nav.contains(e.target);
            swipeRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY, ignore: inNav };
        };
        const onEnd = e => {
            if(swipeRef.current.ignore) return;
            if(activeModalRef.current) return;
            if(!allDates.length) return;
            const dx = e.changedTouches[0].clientX - swipeRef.current.x;
            const dy = Math.abs(e.changedTouches[0].clientY - swipeRef.current.y);
            if(Math.abs(dx) > 60 && dy < 40){
                const cur = activeDateIdxRef.current;
                const dir = dx < 0 ? 1 : -1;
                const ni = Math.max(0, Math.min(allDates.length - 1, cur + dir));
                const nextDate = allDates[ni];
                if(nextDate) goDate(ni, nextDate.fullKey);
            }
        };
        document.addEventListener('touchstart', onStart, { passive: true });
        document.addEventListener('touchend',   onEnd,   { passive: true });
        return () => { document.removeEventListener('touchstart', onStart); document.removeEventListener('touchend', onEnd); };
    },[allDates, goDate]);
    
    const handleStaffClick = useCallback(name=>{ setQueryTarget(name); setActiveModal('queryStaff'); },[]);
    const handleVenueClick = useCallback(id=>{ setQueryTarget(id); setActiveModal('queryVenue'); },[]);
    const closeModal = useCallback(()=>{ setActiveModal(null); setPrevModal(null); },[]);
    const handleModalDismiss = useCallback(()=>{
        if(activeModal === 'calendar' && prevModal){ setActiveModal(prevModal); setPrevModal(null); return; }
        closeModal();
    },[activeModal, prevModal, closeModal]);

    useEffect(() => {
        if(!activeModal) return;
        const onKeyDown = e => { if(e.key === 'Escape') handleModalDismiss(); };
        document.addEventListener('keydown', onKeyDown);
        return () => document.removeEventListener('keydown', onKeyDown);
    }, [activeModal, handleModalDismiss]);

    useEffect(() => {
        document.body.style.cursor = isRefreshing ? 'wait' : '';
        return () => { document.body.style.cursor = ''; };
    }, [isRefreshing]);

    const applyRosterSnapshot = useCallback((snap)=>{
        if(!snap.exists()){ setErrorMsg("找不到班表資料庫，請聯絡管理員"); return; }
        setErrorMsg(null);
        const data=snap.data(), roster=safeParse(data.roster), statuses=safeParse(data.statuses), shows=safeParse(data.shows), notes=safeParse(data.notes);
        if(data.lastUpdated){
            const fmtKey = formatLastUpdated(data.lastUpdated);
            if(fmtKey){
                setLastUpdated(fmtKey);
                setIsRecentlyUpdated(fmtKey !== (window.SafeStorage.get('tpac_seen_update') || ''));
            }
        }
        // 【新功能】在此統一運算 isOff (假日) 屬性
        const keys=Object.keys(roster).sort(), sd=keys.map((k,idx)=>{ 
            const [yy,mm,dd]=k.split('/').map(Number), o=new Date(yy,mm-1,dd); 
            const w=['日','一','二','三','四','五','六'][o.getDay()];
            const isOff=w==='六'||w==='日'||CONFIG.HOLIDAYS.has(k);
            return{d:`${mm}/${dd}`,w,fullKey:k,absIdx:idx,isOff}; 
        });
        setSchedule({roster,statuses,shows,notes}); setAllDates(sd); setIsUnlocked(true);

        if(!keys.length) return;
        const todayKey = formatK(new Date());
        const preferredKey = hasInitializedSnapshotRef.current ? selectedDateKeyRef.current : todayKey;
        const targetKey = keys.includes(preferredKey) ? preferredKey : (keys.includes(todayKey) ? todayKey : keys[0]);
        const targetIdx = keys.indexOf(targetKey);

        hasInitializedSnapshotRef.current = true;
        if(targetIdx !== -1){
            setDateIdx(targetIdx);
            setTimeout(()=>scrollTo(targetKey,"nav-scroll-container"), 300);
        }
    },[formatLastUpdated, scrollTo]);

    const handleRefresh = useCallback(async ()=>{
        if(isRefreshing) return;
        markUpdateSeen();
        if(!user || !window.Firebase) return;
        setIsRefreshing(true);
        await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
        const refreshStartedAt = performance.now();
        try {
            const db = Firebase.getFirestore(Firebase.getApp());
            const snap = await Firebase.getDoc(Firebase.doc(db,'artifacts',CONFIG.APP_ID,'public','data','rosters','master'));
            applyRosterSnapshot(snap);
        } catch(e) {
            console.error(e);
            setErrorMsg("資料刷新失敗，請稍後再試");
        } finally {
            const elapsed = performance.now() - refreshStartedAt;
            if(elapsed < CONFIG.SYNC_FEEDBACK_MS){
                await new Promise(resolve => setTimeout(resolve, CONFIG.SYNC_FEEDBACK_MS - elapsed));
            }
            setIsRefreshing(false);
        }
    },[applyRosterSnapshot, isRefreshing, markUpdateSeen, user]);

    useEffect(() => {
        let unsubscribeAuth = null;
        const initFirebase = async () => {
            let waited = 0;
            while(!window.Firebase && waited < 50) { await new Promise(r => setTimeout(r, 100)); waited++; }
            if(!window.Firebase) { setErrorMsg("Firebase 載入逾時，請重新整理"); return; }
            try {
                const app = Firebase.getApps().length === 0 ? Firebase.initializeApp(CONFIG.FIREBASE) : Firebase.getApp();
                const auth = Firebase.getAuth(app); await Firebase.signInAnonymously(auth);
                unsubscribeAuth = Firebase.onAuthStateChanged(auth, async (u) => {
                    if(!u) return; setUser(u);
                    const db = Firebase.getFirestore(app), snap = await Firebase.getDoc(Firebase.doc(db,'artifacts',CONFIG.APP_ID,'public','data','configs','name_mapping'));
                    if(snap.exists()) setAliasMap(snap.data().maps || {});
                });
            } catch(e) { console.error(e); setErrorMsg("Firebase 初始化失敗，請重新整理"); }
        }; initFirebase();
        return () => { if (unsubscribeAuth) unsubscribeAuth(); };
    }, []);

    useEffect(()=>{
        if(!user) return; 
        const db=Firebase.getFirestore(Firebase.getApp());
        return Firebase.onSnapshot( Firebase.doc(db,'artifacts',CONFIG.APP_ID,'public','data','rosters','master'), applyRosterSnapshot, ()=>setErrorMsg("資料同步失敗，請重新整理") );
    },[applyRosterSnapshot, user]);

    useEffect(()=>{
        if(!allDates.length||!allDates[dateIdx])return;
        const fk=allDates[dateIdx].fullKey;
        if(activeModal==='master')     scrollTo(fk,"master-scroll-container");
        if(activeModal==='queryVenue') scrollTo(fk,"venue-scroll-container");
        if(activeModal==='queryStaff') scrollTo(fk,"staff-scroll-container");
        if(activeModal==='notes')      scrollTo(fk,"notes-scroll-container");
    },[activeModal, queryTarget, allDates, dateIdx, scrollTo]);

    const dData = useMemo(()=>{ 
        if(!allDates.length||!allDates[dateIdx]) return null; 
        const fk=allDates[dateIdx].fullKey, rawR=schedule?.roster?.[fk]||{}, rawS=schedule?.statuses?.[fk]||{}; 
        const s={ ...Object.fromEntries(VENUE_IDS.map(vid=>[vid,Object.fromEntries(CONFIG.SHIFTS.map(sh=>[sh,[]]))])), "辦公":[], "休假":[] }; 
        CONFIG.STAFF_ORDER.forEach(n=>{ 
            let on=false; 
            VENUE_IDS.forEach(vid=>{ 
                if(rawR[vid]?.[n]){ const sh=(rawR[vid][n].shift||CONFIG.SHIFTS[0]).toUpperCase(); if(s[vid][sh]){s[vid][sh].push(n);on=true;} } 
            }); 
            if(!on){ CONFIG.REGEX.OFFICE.test(rawS[n]||"")?s["辦公"].push(n):s["休假"].push(n); } 
        }); 
        return{s}; 
    },[dateIdx,allDates,schedule]);
    
    if(!isUnlocked) return ( <div className="h-screen flex flex-col items-center justify-center text-white/35 text-[16px] font-medium tracking-[0.22em] gap-4" style={{background:'var(--bg-base)'}}> {errorMsg?<span className="text-rose-500 font-bold px-6 text-center leading-relaxed animate-pulse">{errorMsg}</span>:<span className="animate-pulse">CONNECTING...</span>} </div> );
    
    const todayK=formatK(new Date()), curFk=allDates.length?allDates[dateIdx]?.fullKey:todayK, todayNote=schedule?.notes?.[curFk], hasNote=!!(todayNote?.trim()), queryStaff = activeModal==='queryStaff' ? queryTarget : null, queryVenue = activeModal==='queryVenue' ? queryTarget : null;

    return (
        <div className="h-screen flex flex-col overflow-hidden relative text-white bg-[var(--bg-base)]">
            <div className="aura-bg"/>
            <header className="mac-glass pt-12 pb-4 px-5 flex items-center justify-between shrink-0 z-50">
                <div className="flex flex-col justify-center">
                    <h1 className="text-[19px] font-extrabold tracking-[-0.03em] cursor-pointer text-white/90 hover:text-white transition-colors leading-none" onClick={()=>setActiveModal('master')}>視 聽 班 表 系 統</h1>
                    {lastUpdated&&( <button type="button" className={`flex items-center mt-1.5 text-left transition-colors ${isRefreshing?'cursor-wait text-white/78 animate-pulse':`cursor-pointer ${isRecentlyUpdated?'text-white/60':'text-white/32 hover:text-white/58'}`}`} onClick={handleRefresh} title="點擊同步並標記已讀"> {isRecentlyUpdated&&<span className="w-1.5 h-1.5 rounded-full bg-[var(--pink)] mr-1.5 animate-pulse shrink-0"/>} <span className="text-[10px] font-semibold tracking-[0.12em]">{isRefreshing?'SYNCING...':`SYNC: ${lastUpdated}`}</span> </button> )}
                </div>
                <div className="flex items-center gap-2.5 flex-shrink-0">
                    <ActionBtn onClick={handleBackToday} icon="today" tip="回到今天"/>
                    <ActionBtn onClick={openCal} icon="cal" tip="跳轉日期"/>
                </div>
            </header>
            
            <main className="flex-1 overflow-y-auto px-3.5 py-4 no-scrollbar z-10 text-left" style={{paddingBottom:'calc(7rem + env(safe-area-inset-bottom, 0px))'}}>
                <div className="mac-glass sticky top-0 -mx-3 px-3 py-3 flex flex-col mb-4 z-20 shadow-[0_8px_32px_rgba(0,0,0,0.4)] rounded-b-[20px]">
                    <div id="nav-scroll-container" className="flex gap-2.5 overflow-x-auto no-scrollbar pb-2 px-1"> {allDates.map(d=>(<button key={d.fullKey} id={`nav-${d.fullKey}`} onClick={()=>goDate(d.absIdx,d.fullKey)} className={`flex-none w-[58px] py-2.5 rounded-2xl border flex flex-col items-center justify-center transition-all duration-300 ${dateIdx===d.absIdx?'border-blue-500/50 bg-[var(--blue)] shadow-[0_4px_12px_rgba(10,132,255,0.3)] scale-105':'border-white/5 bg-white/[0.03] hover:bg-white/[0.08]'}`}> <span className={`font-bold text-[10px] mb-0.5 ${dateIdx===d.absIdx?'text-white/80':d.isOff?'text-[var(--pink)]':'text-white/40'}`}>週{d.w}</span> <span className={`text-[17px] font-black leading-none ${dateIdx===d.absIdx?'text-white':d.isOff?'text-[var(--pink)]':'text-white/70'}`}>{d.d}</span> </button>))} </div>
                </div>

                <button type="button" className={`w-full mb-5 text-left rounded-[var(--r-md)] px-4 py-3.5 flex items-start gap-3 border transition-colors ${hasNote?'bg-[rgba(255,55,95,0.07)] border-[rgba(255,55,95,0.22)] reminder-glow hover:bg-[rgba(255,55,95,0.11)]':'bg-white/[0.03] border-[var(--border-mid)] hover:bg-white/[0.06]'}`} onClick={()=>setActiveModal('notes')}>
                    <span className={`mt-0.5 shrink-0 ${hasNote?'text-[var(--pink)]':'text-white/45'}`}><Icon name="info"/></span>
                    <div className="min-w-0">
                        <p className={`text-[9.5px] font-bold uppercase tracking-[0.14em] mb-1 ${hasNote?'text-[var(--pink)]':'text-white/38'}`}>{hasNote?'重要提醒':'提醒中心'}</p>
                        <p className={`text-[13.5px] font-medium leading-relaxed whitespace-pre-wrap ${hasNote?'text-white/88':'text-white/58'}`}>{hasNote ? <><span className="md:hidden">{formatNoteText(todayNote, true)}</span><span className="hidden md:inline">{formatNoteText(todayNote, false)}</span></> : '今日無提醒，點擊查看提醒總表'}</p>
                    </div>
                </button>
                
                <div className="grid gap-2.5 mb-5" style={{gridTemplateColumns:`repeat(${CONFIG.VENUES.length},1fr)`}}>
                    {CONFIG.VENUES.map(venue=>{ const sName=schedule?.shows?.[curFk]?.[venue.id]||""; return ( <div key={venue.id} className="bg-[var(--glass-card)] rounded-[var(--r-lg)] overflow-hidden flex flex-col relative" style={{border:`2px solid ${venue.color}88`}}> <div className="absolute inset-0 opacity-10 pointer-events-none" style={{background:`radial-gradient(ellipse 100% 60% at 50% 0%, ${venue.color}22 0%, transparent 100%)`}}/> <button onClick={()=>handleVenueClick(venue.id)} className="py-3 font-extrabold text-[18px] tracking-tight bg-transparent border-b border-[var(--border-dim)] z-10 transition-all hover:bg-white/[0.04] active:scale-[0.98]" style={{color:venue.color}}>{venue.id}</button> <div className="px-2 py-1.5 min-h-[30px] flex items-center justify-center border-b border-[var(--border-dim)] bg-[var(--glass-inset)] text-center overflow-hidden text-[11px] font-medium text-white/50 z-10"> <div className="mq-wrap"><span className={sName.length>8?"mq-run":"truncate"}>{sName}</span></div> </div> <div className="p-1.5 space-y-1.5 z-10"> {CONFIG.SHIFTS.map(sh=>( <div key={sh} className="bg-[var(--glass-inset)] rounded-[var(--r-sm)] p-1.5 flex flex-col gap-1.5 min-h-[68px]" style={{border:`1.5px solid ${venue.color}44`}}> {dData?.s[venue.id][sh]?.map(n=><StaffBtn key={n} name={n} aliasMap={aliasMap} mode="small" onClick={handleStaffClick}/>)} </div> ))} </div> </div> ); })}
                </div>
                
                <div className="space-y-4">
                    <section className="bg-[var(--glass-card)] border border-[var(--border-dim)] rounded-[var(--r-lg)] p-4"> <h4 className="text-[var(--orange)]/80 text-[11px] font-bold uppercase tracking-[0.14em] mb-3 flex items-center gap-2"><Icon name="brief"/> 辦公人員</h4> <div className="grid grid-cols-4 gap-2.5">{dData?.s["辦公"]?.map(n=><StaffBtn key={n} name={n} aliasMap={aliasMap} mode="tiny" onClick={handleStaffClick}/>)}</div> </section>
                    <section className="bg-[var(--glass-card)] border border-[var(--border-dim)] rounded-[var(--r-lg)] p-4"> <h4 className="text-white/30 text-[11px] font-bold uppercase tracking-[0.14em] mb-3 flex items-center gap-2"><Icon name="sun"/> 今日休假</h4> <div className="grid grid-cols-4 gap-2.5">{dData?.s["休假"]?.map(n=><StaffBtn key={n} name={n} aliasMap={aliasMap} mode="tiny" onClick={handleStaffClick}/>)}</div> </section>
                </div>
            </main>

            {activeModal==='notes'&&( <NotesModal onClose={closeModal} visibleDates={visibleDates} schedule={schedule} goDate={goDate} handleBackToday={handleBackToday}/> )}
            {activeModal==='master'&&( <MasterRosterModal onClose={closeModal} visibleDates={visibleDates} schedule={schedule} aliasMap={aliasMap} todayK={todayK} handleStaffClick={handleStaffClick} handleBackToday={handleBackToday} openCal={openCal}/> )}
            {(activeModal==='queryStaff'||activeModal==='queryVenue')&&( <QueryModal queryStaff={queryStaff} queryVenue={queryVenue} onClose={closeModal} setQueryStaff={name=>{ if(name){setQueryTarget(name);setActiveModal('queryStaff');} else closeModal(); }} setQueryVenue={id=>{ if(id){setQueryTarget(id);setActiveModal('queryVenue');} else closeModal(); }} visibleDates={visibleDates} schedule={schedule} aliasMap={aliasMap} curFk={curFk} handleStaffClick={handleStaffClick} handleBackToday={handleBackToday} openCal={openCal} /> )}
            {activeModal==='calendar'&&( <CalendarPicker allDates={allDates} onSelect={fk=>{ const i=allDates.findIndex(d=>d.fullKey===fk); if(i!==-1)goDate(i,fk); if(prevModal){ setActiveModal(prevModal); setPrevModal(null); } else closeModal(); }} onClose={()=>{ if(prevModal){setActiveModal(prevModal);setPrevModal(null);} else closeModal(); }} calMonth={calMonth} setCalMonth={setCalMonth} /> )}
            
            <footer className="fixed bottom-0 left-0 right-0 py-2.5 flex items-center justify-center pointer-events-none text-[9px] font-semibold tracking-[0.28em] text-white/14"> <span>TPAC SCHEDULE SYSTEM | {CONFIG.APP_VERSION}</span> </footer>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
