<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>視聽班表系統 | V9 | claude.ai</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        window.Firebase = { initializeApp, getApps, getApp, getFirestore, doc, onSnapshot, getDoc, getAuth, signInAnonymously, onAuthStateChanged };
        window.isFirebaseReady = true;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mac-bg:#1c1c1e; --mac-card:#2c2c2e; --mac-card-light:#3a3a3c; --mac-blue:#0A84FF; --weekend-pink:#FF6482; --women-text:#FFD6E0; --men-text:#E0F7FF; --special-text:#FFFFE0; --women-dot:#FF375F; --men-dot:#00FFFF; --special-dot:#FFD60A; --reminder-pink:#FF69B4; }
        body { font-family:'Inter','Noto Sans TC',sans-serif; height:100vh; overflow:hidden; background:var(--mac-bg); color:#fff; -webkit-font-smoothing:antialiased; }
        .aura-bg { position:fixed; inset:0; background:radial-gradient(circle at 50% 0%, #3a3a3c 0%, #1c1c1e 100%); z-index:0; pointer-events:none; }
        .mac-glass { background:rgba(44,44,46,0.9); backdrop-filter:blur(40px) saturate(200%); border-bottom:0.5px solid rgba(255,255,255,0.15); }
        .no-scrollbar::-webkit-scrollbar { display:none; }
        .btn-today { background:var(--mac-blue); color:white; padding:4px 12px; border-radius:9999px; font-size:10px; font-weight:900; box-shadow:0 4px 10px rgba(10,132,255,0.3); transition:all 0.2s ease; flex-shrink:0; }
        .weekend-bg { background:rgba(255,100,130,0.05) !important; }
        .b-shift-glow { animation:b-glow 1.5s infinite alternate; }
        @keyframes b-glow { 0%{box-shadow:0 0 2px rgba(255,255,255,0.4);}100%{box-shadow:0 0 8px #fff,0 0 15px rgba(255,255,255,0.6);} }
        .master-left-col { position:absolute; left:0; top:0; bottom:0; width:85px; z-index:50; background-color:var(--mac-card); border-right:2px solid rgba(255,255,255,0.3); display:flex; flex-direction:column; }
        .master-right { margin-left:85px; overflow-x:auto; overflow-y:hidden; display:block; }
        .master-cell { min-width:80px; flex-shrink:0; text-align:center; border-left:1px solid rgba(255,255,255,0.05); }
        .master-hdr { height:50px; }
        .master-row { height:48px; display:flex; align-items:center; }
        .day-block { background:var(--mac-card-light); border:1px solid rgba(255,255,255,0.2); border-radius:1rem; padding:12px; margin-bottom:10px; }
        .day-block-today { background:#48484a !important; border:2px solid var(--mac-blue) !important; box-shadow:0 0 20px rgba(10,132,255,0.3) !important; }
        .master-today { background:rgba(10,132,255,0.2) !important; border-left:1.5px solid var(--mac-blue) !important; border-right:1.5px solid var(--mac-blue) !important; }
        .mq-wrap { overflow:hidden; white-space:nowrap; position:relative; width:100%; }
        .mq-run { display:inline-block; padding-left:100%; animation:mq 20s linear infinite; }
        @keyframes mq { 0%{transform:translateX(0);}100%{transform:translateX(-100%);} }
        @keyframes reminder-pulse { 0%{box-shadow:0 0 5px rgba(255,105,180,0.2);border-color:rgba(255,105,180,0.3);}50%{box-shadow:0 0 25px rgba(255,105,180,0.6);border-color:var(--reminder-pink);}100%{box-shadow:0 0 5px rgba(255,105,180,0.2);border-color:rgba(255,105,180,0.3);} }
        .reminder-glow { animation:reminder-pulse 2s infinite ease-in-out; border-width:1.5px !important; }
        @keyframes b-badge-glow {
            0%  {box-shadow:0 0 4px rgba(255,255,255,0.3),0 0 0px rgba(255,255,255,0);}
            50% {box-shadow:0 0 14px rgba(255,255,255,0.95),0 0 28px rgba(255,255,255,0.4);}
            100%{box-shadow:0 0 4px rgba(255,255,255,0.3),0 0 0px rgba(255,255,255,0);}
        }
        .b-badge-glow { animation:b-badge-glow 1.8s infinite ease-in-out; border:1.5px solid rgba(255,255,255,0.75)!important; }
        .wk-GT  { background:rgba(255,45,85,0.13)  !important; border-color:rgba(255,45,85,0.4)   !important; }
        .wk-BB  { background:rgba(0,255,255,0.08)  !important; border-color:rgba(0,255,255,0.32)  !important; }
        .wk-GP  { background:rgba(50,222,132,0.09) !important; border-color:rgba(50,222,132,0.32) !important; }
        .wk-off { background:rgba(255,100,130,0.07)!important; border-color:rgba(255,100,130,0.25)!important; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, memo, useCallback } = React;

/* ══════════════════════════════════════════════════════════
   CENTRAL CONFIG  ── 新增廳院 / 人員 / 班別只改這裡
   ══════════════════════════════════════════════════════════ */

// 廳院設定：新增廳院在此加一筆，程式碼自動跟上
const VENUES = [
    { id:'GT', color:'#FF2D55', masterBg:'#8B0000' },
    { id:'BB', color:'#00FFFF', masterBg:'#008B8B' },
    { id:'GP', color:'#32DE84', masterBg:'#006400' },
    // 範例：{ id:'MH', color:'#FFD60A', masterBg:'#7A6500' },
];
const VENUE_IDS = VENUES.map(v => v.id);
const VENUE_MAP = Object.fromEntries(VENUES.map(v => [v.id, v]));

// 班別設定：新增班別在此加，卡片格數自動調整
const SHIFTS = ['A', 'B'];

// 人員設定：gender M/F，type Normal/Special
const STAFF_ORDER = ["王志剛","張國飛","張劭如","謝祥玄","張懷德","楊淯舒","黎祐甄","廖俊龍","曾健洋","劉智敏"];
const STAFF_INFO = {
    "王志剛":{ gender:"M", type:"Normal"  }, "張國飛":{ gender:"M", type:"Normal"  },
    "張劭如":{ gender:"F", type:"Normal"  }, "謝祥玄":{ gender:"M", type:"Normal"  },
    "張懷德":{ gender:"M", type:"Normal"  }, "楊淯舒":{ gender:"F", type:"Normal"  },
    "黎祐甄":{ gender:"F", type:"Normal"  }, "廖俊龍":{ gender:"M", type:"Normal"  },
    "曾健洋":{ gender:"M", type:"Special" }, "劉智敏":{ gender:"M", type:"Special" },
};

/* ══════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = { apiKey:"AIzaSyAx2aYlfqHBUe3V7a3sT5ZPVNYyr2JY8OA", authDomain:"tpac-schedule.firebaseapp.com", projectId:"tpac-schedule", storageBucket:"tpac-schedule.firebasestorage.app", messagingSenderId:"70955835780", appId:"1:70955835780:web:9d3b0958738557d1f7fdd1" };

const formatK = d => `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;

const staffColors = info => {
    if (!info || info.type==="Special") return { text:"text-[var(--special-text)]", dot:"bg-[var(--special-dot)]" };
    return info.gender==="F"
        ? { text:"text-[var(--women-text)]", dot:"bg-[var(--women-dot)]" }
        : { text:"text-[var(--men-text)]",   dot:"bg-[var(--men-dot)]"   };
};

const Icon = memo(({ name, className="w-4 h-4" }) => {
    const d = {
        refresh: <><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21h5v-5"/></>,
        info:    <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
        sun:     <path d="M12 2v2m0 16v2m10-10h-2M4 12H2m15.364-7.364-1.414 1.414M7.05 16.95l-1.414 1.414M16.95 16.95l1.414 1.414M5.636 5.636l1.414 1.414M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>,
        brief:   <><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>,
    };
    return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{d[name]}</svg>;
});

const StaffBtn = memo(({ name, aliasMap={}, forceName=null, onClick, mode="normal" }) => {
    const info = STAFF_INFO[name] || { gender:'M', type:'Normal' };
    const { text, dot } = staffColors(info);
    const disp = forceName || aliasMap[name] || name;
    const isLong = name==="廖俊龍";
    const sz = mode==="tiny" ? "text-[14px] h-10" : mode==="small" ? `${isLong?"text-[16px]":"text-[18px]"} h-8` : mode==="master" ? "text-[16px] h-8" : `${isLong?"text-[22px]":"text-[26px]"} h-10`;
    return (
        <button onClick={e=>{e.stopPropagation();onClick&&onClick(name);}}
            className={`w-full ${sz} rounded-[0.6rem] font-normal border border-white/10 bg-white/10 flex items-center justify-center gap-1 shadow-sm ${text} truncate shrink-0 active:scale-95 transition-transform`}>
            <span className={`w-1 h-1 rounded-full ${dot}`}></span>{disp}
        </button>
    );
});

const CalendarPicker = memo(({ dates, onSelect, onClose, calMonth, setCalMonth }) => {
    const dateSet = useMemo(()=>new Set(dates.map(d=>d.fullKey)),[dates]);
    const {y,m} = calMonth;
    const firstDay = new Date(y,m,1).getDay();
    const daysInMonth = new Date(y,m+1,0).getDate();
    const todayK=(()=>{const n=new Date();return `${n.getFullYear()}/${(n.getMonth()+1).toString().padStart(2,'0')}/${n.getDate().toString().padStart(2,'0')}`;})();
    const cells=[];
    for(let i=0;i<firstDay;i++)cells.push(null);
    for(let d=1;d<=daysInMonth;d++)cells.push(d);
    const toKey=d=>`${y}/${(m+1).toString().padStart(2,'0')}/${d.toString().padStart(2,'0')}`;
    const prev=()=>setCalMonth(p=>p.m===0?{y:p.y-1,m:11}:{y:p.y,m:p.m-1});
    const next=()=>setCalMonth(p=>p.m===11?{y:p.y+1,m:0}:{y:p.y,m:p.m+1});
    return(
        <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-black/80 backdrop-blur-xl" onClick={onClose}>
            <div className="bg-[#2c2c2e] border border-white/15 rounded-[2rem] shadow-2xl w-full max-w-xs p-5" onClick={e=>e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                    <button onClick={prev} className="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-white/70 hover:bg-white/20 text-lg">&#8249;</button>
                    <span className="font-black text-base tracking-wide">{y}年{m+1}月</span>
                    <button onClick={next} className="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-white/70 hover:bg-white/20 text-lg">&#8250;</button>
                </div>
                <div className="grid grid-cols-7 mb-1">
                    {['日','一','二','三','四','五','六'].map((w,i)=>(
                        <div key={w} className={`text-center text-[10px] font-black py-1 ${i===0||i===6?'text-[var(--weekend-pink)]':'text-white/30'}`}>{w}</div>
                    ))}
                </div>
                <div className="grid grid-cols-7 gap-y-1">
                    {cells.map((d,i)=>{
                        if(!d)return <div key={"e"+i}/>;
                        const fk=toKey(d);
                        const has=dateSet.has(fk);
                        const isToday=fk===todayK;
                        const dow=(firstDay+d-1)%7;
                        const isWk=dow===0||dow===6;
                        return(
                            <button key={fk} disabled={!has} onClick={()=>{onSelect(fk);onClose();}}
                                className={"h-9 w-full rounded-xl text-[13px] font-black transition-all "+(
                                    isToday?'bg-[var(--mac-blue)] text-white shadow-lg':
                                    has?(isWk?'text-[var(--weekend-pink)] bg-white/5 hover:bg-white/15':'text-white bg-white/5 hover:bg-white/15'):
                                    'text-white/15 cursor-default'
                                )}>
                                {d}
                            </button>
                        );
                    })}
                </div>
                <button onClick={onClose} className="mt-4 w-full py-2 rounded-full bg-white/5 text-white/40 text-[11px] font-black uppercase tracking-widest hover:bg-white/10">Close</button>
            </div>
        </div>
    );
});

const App = () => {
    const [dates,setDates]=useState([]), [schedule,setSchedule]=useState({roster:{},statuses:{},shows:{},notes:{}});
    const [dateIdx,setDateIdx]=useState(0), [isUnlocked,setIsUnlocked]=useState(false), [user,setUser]=useState(null);
    const [aliasMap,setAliasMap]=useState({}), [queryStaff,setQueryStaff]=useState(null), [queryVenue,setQueryVenue]=useState(null);
    const [showMaster,setShowMaster]=useState(false);
    const [showCalendar,setShowCalendar]=useState(false);
    const [calMonth,setCalMonth]=useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()};});

    const scrollTo = useCallback((fk, cid) => {
        setTimeout(() => {
            const c = document.getElementById(cid); if(!c) return;
            const idMap = { "nav-scroll-container":`nav-${fk}`, "master-scroll-container":`mnav-${fk}` };
            const el = document.getElementById(idMap[cid]||`mrow-${fk}`); if(!el) return;
            const horiz = cid.includes("nav")||cid==="master-scroll-container";
            horiz ? c.scrollTo({left:el.offsetLeft-c.offsetWidth/2+el.offsetWidth/2,behavior:'smooth'})
                  : c.scrollTo({top:el.offsetTop-c.offsetHeight/2+el.offsetHeight/2,behavior:'smooth'});
        },50);
    },[]);

    const allScrollTo = useCallback((fk) => {
        ["nav-scroll-container","master-scroll-container","venue-scroll-container","staff-scroll-container"].forEach(id=>scrollTo(fk,id));
    },[scrollTo]);

    const goDate = useCallback((idx,fk) => { setDateIdx(idx); allScrollTo(fk); },[allScrollTo]);
    const handleBackToday = useCallback(()=>{ const tK=formatK(new Date()); const i=dates.findIndex(d=>d.fullKey===tK); if(i!==-1)goDate(i,tK); },[dates,goDate]);
    const shiftWeek = useCallback(dir=>{ const ni=Math.max(0,Math.min(dates.length-1,dateIdx+dir*7)); goDate(ni,dates[ni].fullKey); },[dateIdx,dates,goDate]);
    const handleStaffClick = useCallback(name=>{ setQueryStaff(name); setQueryVenue(null); },[]);

    const handleCalendarSelect = useCallback(fk=>{
        const i=dates.findIndex(d=>d.fullKey===fk); if(i===-1)return;
        goDate(i,fk); setShowCalendar(false);
    },[dates,goDate]);

    useEffect(()=>{
        const t=setInterval(()=>{
            if(!window.isFirebaseReady||!window.Firebase) return;
            clearInterval(t);
            const app=Firebase.getApps().length===0?Firebase.initializeApp(FIREBASE_CONFIG):Firebase.getApp();
            Firebase.signInAnonymously(Firebase.getAuth(app)).then(()=>{
                Firebase.onAuthStateChanged(Firebase.getAuth(app),async u=>{
                    if(!u)return; setUser(u);
                    const s=await Firebase.getDoc(Firebase.doc(Firebase.getFirestore(app),'artifacts','tpac-schedule','public','data','configs','name_mapping'));
                    if(s.exists())setAliasMap(s.data().maps||{});
                });
            });
        },200);
        return()=>clearInterval(t);
    },[]);

    useEffect(()=>{
        if(!user)return;
        const db=Firebase.getFirestore();
        return Firebase.onSnapshot(Firebase.doc(db,'artifacts','tpac-schedule','public','data','rosters','master'),snap=>{
            if(!snap.exists())return;
            const d=snap.data();
            const roster=JSON.parse(d.roster||'{}'),statuses=JSON.parse(d.statuses||'{}'),shows=JSON.parse(d.shows||'{}'),notes=JSON.parse(d.notes||'{}');
            const keys=Object.keys(roster).sort();
            const sd=keys.map(k=>{const[y,m,day]=k.split('/').map(Number);const o=new Date(y,m-1,day);return{d:`${m}/${day}`,w:['日','一','二','三','四','五','六'][o.getDay()],fullKey:k};});
            setSchedule({roster,statuses,shows,notes});
            setDates(sd); setIsUnlocked(true);
            const tK=formatK(new Date()),mi=keys.indexOf(tK);
            if(mi!==-1){setDateIdx(mi);setTimeout(()=>scrollTo(tK,"nav-scroll-container"),500);}
        });
    },[user,scrollTo]);

    useEffect(()=>{ if(showMaster&&dates[dateIdx])scrollTo(dates[dateIdx].fullKey,"master-scroll-container"); },[showMaster]);
    useEffect(()=>{ if(queryVenue&&dates[dateIdx])scrollTo(dates[dateIdx].fullKey,"venue-scroll-container"); },[queryVenue]);
    useEffect(()=>{ if(queryStaff&&dates[dateIdx])scrollTo(dates[dateIdx].fullKey,"staff-scroll-container"); },[queryStaff]);

    const dData = useMemo(()=>{
        if(!dates[dateIdx])return null;
        const fk=dates[dateIdx].fullKey, rawR=schedule.roster[fk]||{}, rawS=schedule.statuses[fk]||{};
        const s={...Object.fromEntries(VENUE_IDS.map(vid=>[vid,Object.fromEntries(SHIFTS.map(sh=>[sh,[]]))])),"辦公":[],"休假":[]};
        STAFF_ORDER.forEach(n=>{
            let on=false;
            VENUE_IDS.forEach(vid=>{ if(rawR[vid]?.[n]){const sh=(rawR[vid][n].shift||SHIFTS[0]).toUpperCase();if(s[vid][sh]){s[vid][sh].push(n);on=true;}} });
            if(!on){ if((rawS[n]||"").match(/辦公|其他/))s["辦公"].push(n); else s["休假"].push(n); }
        });
        return{s};
    },[dateIdx,dates,schedule]);

    if(!isUnlocked)return <div className="h-screen bg-black flex items-center justify-center text-white text-xl font-black italic animate-pulse">CONNECTING...</div>;

    const todayK=formatK(new Date()), curFk=dates[dateIdx]?.fullKey, todayNote=schedule.notes?.[curFk], hasNote=!!(todayNote?.trim());

    return (
        <div className="h-screen flex flex-col overflow-hidden relative text-white bg-[var(--mac-bg)]">
            <div className="aura-bg"></div>

            <header className="mac-glass pt-10 pb-3 px-4 flex items-center justify-between shrink-0 z-50">
                <div className="flex items-center gap-3">
                    <button onClick={handleBackToday} className="btn-today">Today</button>
                    <h1 className="text-xl font-black italic cursor-pointer" onClick={()=>setShowMaster(true)}>視聽班表系統</h1>
                </div>
                <div className="flex items-center gap-2"><button onClick={()=>{setCalMonth({y:new Date().getFullYear(),m:new Date().getMonth()});setShowCalendar(true);}} className="h-7 w-7 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-white/50"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></button><button onClick={()=>window.location.reload()} className="h-7 w-7 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-white/50"><Icon name="refresh" className="w-3 h-3"/></button></div>
            </header>

            <main className="flex-1 overflow-y-auto px-2 py-3 no-scrollbar pb-24 z-10 text-left">
                {/* 日期導覽 */}
                <div className="mac-glass sticky top-0 -mx-2 px-2 py-2 flex flex-col mb-4 z-20 shadow-2xl">
                    <div className="flex items-center justify-between mb-2 px-1">
                        <button onClick={()=>shiftWeek(-1)} className="text-white/40 hover:text-white p-2 text-xs">◀ 上週</button>
                        <span className="text-[10px] font-bold text-white/40 tracking-widest uppercase">Timeline</span>
                        <button onClick={()=>shiftWeek(1)}  className="text-white/40 hover:text-white p-2 text-xs">下週 ▶</button>
                    </div>
                    <div id="nav-scroll-container" className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                        {dates.map((d,idx)=>{
                            const active=dateIdx===idx,isW=d.w==='六'||d.w==='日';
                            return(
                                <button key={d.fullKey} id={`nav-${d.fullKey}`} onClick={()=>goDate(idx,d.fullKey)}
                                    className={`flex-none w-[55px] py-2 rounded-xl border-2 flex flex-col items-center justify-center ${active?'border-blue-500 bg-blue-500/10':'border-transparent bg-white/5 opacity-50'}`}>
                                    <span className={`font-black text-[10px] ${isW?'text-[var(--weekend-pink)]':'text-white/70'}`}>週{d.w}</span>
                                    <span className={`text-base font-black leading-none ${active?'text-white':isW?'text-[var(--weekend-pink)]':'text-white/80'}`}>{d.d}</span>
                                </button>
                            );
                        })}
                    </div>
                    <div className="mt-3 px-1">
                        <div className={`bg-[#3a3a3c] border border-white/20 rounded-xl px-4 py-3 flex items-start gap-3 shadow-2xl transition-all ${hasNote?'reminder-glow':''}`}>
                            <span className={`${hasNote?'text-[var(--reminder-pink)]':'text-blue-400'} mt-1`}><Icon name="info"/></span>
                            <div className="flex flex-col">
                                <span className={`text-[10px] font-black uppercase ${hasNote?'text-[var(--reminder-pink)]':'text-blue-400'}`}>重要提醒</span>
                                <p className={`text-[15px] font-bold ${hasNote?'text-white':'text-white/40'}`}>{hasNote?todayNote:"今日尚無重要記事。"}</p>
                            </div>
                        </div>
                    </div>
                </div>

                {/* 廳院卡片（動態產生，新增廳院自動出現） */}
                <div className="grid gap-2 mb-6" style={{gridTemplateColumns:`repeat(${VENUES.length},1fr)`}}>
                    {VENUES.map(venue=>{
                        const sName=schedule.shows?.[curFk]?.[venue.id]||"";
                        return(
                            <div key={venue.id} className="bg-[var(--mac-card)] rounded-[1.5rem] overflow-hidden flex flex-col shadow-lg border-2" style={{borderColor:venue.color}}>
                                <button onClick={()=>setQueryVenue(venue.id)} className="py-2 font-black text-xl bg-white/[0.05]" style={{color:venue.color}}>{venue.id}</button>
                                <div className="px-1 py-1 min-h-[30px] flex items-center justify-center border-b border-white/5 bg-black/20 text-center overflow-hidden text-[13px] font-bold italic">
                                    <div className="mq-wrap"><span className={sName.length>8?"mq-run":"truncate"}>{sName}</span></div>
                                </div>
                                <div className="p-1 space-y-1">
                                    {SHIFTS.map(sh=>(
                                        <div key={sh} className="bg-white/5 rounded-[1rem] p-1 flex flex-col gap-1 min-h-[60px]">
                                            {dData?.s[venue.id][sh]?.map(n=><StaffBtn key={n} name={n} aliasMap={aliasMap} mode="small" onClick={handleStaffClick}/>)}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    })}
                </div>

                {/* 辦公 / 休假 */}
                <div className="space-y-4 px-1">
                    <section className="bg-[var(--mac-card)] border border-white/10 rounded-[1.5rem] p-4">
                        <h4 className="text-orange-400 text-[14px] font-black uppercase mb-3 flex items-center gap-2"><Icon name="brief"/> 辦公人員</h4>
                        <div className="grid grid-cols-4 gap-2">{dData?.s["辦公"]?.map(n=><StaffBtn key={n} name={n} aliasMap={aliasMap} mode="tiny" onClick={handleStaffClick}/>)}</div>
                    </section>
                    <section className="bg-[var(--mac-card)] border border-white/10 rounded-[1.5rem] p-4">
                        <h4 className="text-gray-400 text-[14px] font-black uppercase mb-3 flex items-center gap-2"><Icon name="sun"/> 今日休假</h4>
                        <div className="grid grid-cols-4 gap-2">{dData?.s["休假"]?.map(n=><StaffBtn key={n} name={n} aliasMap={aliasMap} mode="tiny" onClick={handleStaffClick}/>)}</div>
                    </section>
                </div>
            </main>

            {/* Master Roster Modal */}
            {showMaster&&(
                <div className="fixed inset-0 z-[1000] flex items-center justify-center p-2 bg-black/95 backdrop-blur-3xl" onClick={()=>setShowMaster(false)}>
                    <div className="bg-[var(--mac-bg)] border border-white/10 w-full max-w-4xl rounded-[2rem] shadow-2xl flex flex-col max-h-[90vh] overflow-hidden" onClick={e=>e.stopPropagation()}>
                        <div className="p-4 border-b border-white/10 flex items-center gap-3 bg-[var(--mac-card)]">
                            <button onClick={()=>setShowMaster(false)} className="w-8 h-8 rounded-full bg-white/10 text-xl">×</button>
                            <button onClick={handleBackToday} className="btn-today">Today</button>
                            <h3 className="text-lg font-black italic">Master Roster</h3>
                            <button onClick={()=>{setCalMonth({y:new Date().getFullYear(),m:new Date().getMonth()});setShowCalendar(true);}} className="ml-auto w-8 h-8 rounded-full bg-white/10 border border-white/15 flex items-center justify-center text-white/60 hover:bg-white/20 transition-all"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></button>
                        </div>
                        <div className="flex-1 overflow-hidden relative">
                            <div className="master-left-col">
                                <div className="master-hdr flex items-center justify-center border-b border-white/20 text-[9px] font-black text-white/40">STAFF</div>
                                {STAFF_ORDER.map(s=>(
                                    <div key={s} className="master-row px-1 border-b border-white/5">
                                        <StaffBtn name={s} aliasMap={aliasMap} mode="master" forceName={s==="廖俊龍"?"阿龍":null} onClick={handleStaffClick}/>
                                    </div>
                                ))}
                            </div>
                            <div id="master-scroll-container" className="master-right h-full overflow-y-auto no-scrollbar scroll-smooth">
                                <div style={{width:'fit-content'}}>
                                    <div className="flex bg-[var(--mac-card-light)] border-b border-white/20 sticky top-0 z-40 master-hdr">
                                        {dates.map(d=>{
                                            const isW=d.w==='六'||d.w==='日';
                                            return(<div key={d.fullKey} id={`mnav-${d.fullKey}`} className={`master-cell p-2 ${d.fullKey===todayK?'master-today':''} ${isW?'weekend-bg':''}`}>
                                                <div className={`font-black text-[10px] ${isW?'text-[var(--weekend-pink)]':'text-white/60'}`}>週{d.w}</div>
                                                <div className={`text-[13px] font-bold ${isW?'text-[var(--weekend-pink)]':''}`}>{d.d}</div>
                                            </div>);
                                        })}
                                    </div>
                                    {STAFF_ORDER.map(staff=>(
                                        <div key={staff} className="master-row border-b border-white/5">
                                            {dates.map(d=>{
                                                const dk=d.fullKey,isW=d.w==='六'||d.w==='日';
                                                let label="—",bgStyle={backgroundColor:'rgba(255,255,255,0.05)'},txtCls="text-white/10 text-[13px]",isB=false,hasS=false,activeV="";
                                                VENUE_IDS.forEach(vid=>{
                                                    if(schedule.roster[dk]?.[vid]?.[staff]){
                                                        const sh=schedule.roster[dk][vid][staff].shift;
                                                        label=`${vid}-${sh}`; bgStyle={backgroundColor:VENUE_MAP[vid].masterBg+'4D'};
                                                        txtCls="text-white text-[11px]"; hasS=true; activeV=vid;
                                                        if(sh==='B')isB=true;
                                                    }
                                                });
                                                if(schedule.statuses[dk]?.[staff]?.match(/辦公|其他/)){label="辦";bgStyle={backgroundColor:'rgba(249,115,22,0.25)'};txtCls="text-orange-200 text-[14px]";}
                                                else if(!hasS){label="休";bgStyle={backgroundColor:'rgba(82,82,91,0.8)'};txtCls="text-white/50 text-[14px]";}
                                                return(
                                                    <div key={dk} className={`master-cell p-1 ${dk===todayK?'master-today':''} ${isW?'weekend-bg':''}`}>
                                                        <div className={`w-full h-8 flex items-center justify-center rounded-md ${txtCls} ${isB?'b-shift-glow border border-white':''}`}
                                                            style={bgStyle}
                                                            onClick={()=>{if(hasS)alert(`【${dk} ${activeV}】\n${schedule.shows[dk]?.[activeV]||"無演出內容"}`);}}>
                                                            {label}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {/* Staff / Venue Query Modal */}
            {(queryStaff||queryVenue)&&(
                <div className="fixed inset-0 z-[2000] flex items-center justify-center p-6 bg-black/90 backdrop-blur-2xl" onClick={()=>{setQueryStaff(null);setQueryVenue(null);}}>
                    <div className="bg-[var(--mac-bg)] border border-white/10 w-full max-w-lg rounded-[2.5rem] shadow-2xl flex flex-col max-h-[85vh] overflow-hidden" onClick={e=>e.stopPropagation()}>
                        <div className="p-4 border-b border-white/10 bg-[var(--mac-card)]">
                            <div className="flex items-center gap-3">
                                <button onClick={()=>{setQueryStaff(null);setQueryVenue(null);}} className="w-8 h-8 rounded-full bg-white/10 text-2xl">×</button>
                                <button onClick={handleBackToday} className="btn-today">Today</button>
                                <h3 className="text-xl font-black italic">{queryVenue?`${queryVenue} Weekly`:(aliasMap[queryStaff]||queryStaff)}</h3>
                                <button onClick={()=>{setCalMonth({y:new Date().getFullYear(),m:new Date().getMonth()});setShowCalendar(true);}} className="ml-auto w-8 h-8 rounded-full bg-white/10 border border-white/15 flex items-center justify-center text-white/60 hover:bg-white/20 transition-all"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></button>
                            </div>
                            {queryVenue&&(
                                <div className="flex gap-1.5 mt-2.5">
                                    {VENUES.map(v=>(<button key={v.id} onClick={()=>setQueryVenue(v.id)} className={`flex-1 py-1.5 rounded-xl text-[13px] font-black transition-all border ${queryVenue===v.id?'bg-white/10 border-white/20':'border-transparent text-white/25 hover:text-white/50'}`} style={{color:queryVenue===v.id?v.color:undefined}}>{v.id}</button>))}
                                </div>
                            )}
                        </div>
                        <div id={queryVenue?"venue-scroll-container":"staff-scroll-container"} className="flex-1 overflow-y-auto p-3 space-y-3 no-scrollbar scroll-smooth">
                            {dates.map(d=>{
                                const isS=d.fullKey===curFk, isW=d.w==='六'||d.w==='日';
                                if(queryVenue){
                                    const vn=schedule.shows[d.fullKey]?.[queryVenue]||"—";
                                    return(
                                        <div key={d.fullKey} id={`mrow-${d.fullKey}`} className={`day-block ${isS?'day-block-today':''}`}>
                                            <div className="mb-2 pb-2 border-b border-white/10 text-sm font-light italic opacity-60 text-right overflow-hidden">
                                                <div className="mq-wrap"><span className={vn.length>8?"mq-run":""}>{vn}</span></div>
                                            </div>
                                            <div className="flex items-start gap-4">
                                                <div className="flex flex-col text-left pr-2 border-r border-white/10 w-20 justify-center leading-none">
                                                    <span className={`font-black mb-1 text-[12px] ${isW?'text-[var(--weekend-pink)]':'text-white/50'}`}>週{d.w}</span>
                                                    <span className={`text-[24px] font-black tracking-tighter ${isW?'text-[var(--weekend-pink)]':''}`}>{d.d}</span>
                                                </div>
                                                <div className="flex-1 grid grid-cols-2 gap-2">
                                                    {SHIFTS.map(sh=>(
                                                        <div key={sh} className="bg-black/20 rounded-xl p-1 min-h-[40px] flex flex-col gap-1">
                                                            {Object.entries(schedule.roster[d.fullKey]?.[queryVenue]||{}).filter(([,v])=>v.shift===sh).map(([n])=><StaffBtn key={n} name={n} aliasMap={aliasMap} onClick={handleStaffClick} mode="small"/>)}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                }
                                let st="辦公",co="#FF9500",hasS=false,activeV="",activeSh="";
                                VENUE_IDS.forEach(vid=>{
                                    if(schedule.roster[d.fullKey]?.[vid]?.[queryStaff]){
                                        const sh=schedule.roster[d.fullKey][vid][queryStaff].shift;
                                        st=`${vid}-${sh}`; co=VENUE_MAP[vid]?.color||'#0A84FF'; hasS=true; activeV=vid; activeSh=sh;
                                    }
                                });
                                if(schedule.statuses[d.fullKey]?.[queryStaff]?.match(/休|例|假/)){st="休假";co="#8E8E93";}
                                const sn=hasS?(schedule.shows[d.fullKey]?.[activeV]||""):"";
                                const wkCls=isW?(hasS?`wk-${activeV}`:'wk-off'):'';
                                const isBShift=activeSh==='B';
                                return(
                                    <div key={d.fullKey} id={`mrow-${d.fullKey}`} className={`flex items-center gap-3 day-block ${isS?'day-block-today':''} ${wkCls}`}>
                                        <div className="flex flex-col text-left pr-3 border-r border-white/10 w-20 leading-none shrink-0 justify-center">
                                            <span className={`font-black mb-1 text-[12px] ${isW?'text-[var(--weekend-pink)]':'text-white/50'}`}>週{d.w}</span>
                                            <span className={`text-[24px] font-black tracking-tighter ${isW?'text-[var(--weekend-pink)]':''}`}>{d.d}</span>
                                        </div>
                                        <div className="flex-1 mq-wrap text-[18px] font-light text-white opacity-50 italic"><span className={sn.length>10?"mq-run":""}>{sn}</span></div>
                                        <button onClick={()=>{if(hasS){setQueryStaff(null);setQueryVenue(activeV);}}} className={`text-lg font-black px-3 py-1 rounded-lg shrink-0 transition-all ${isBShift?'b-badge-glow':''} ${hasS?'hover:bg-white/10 active:scale-95 cursor-pointer':'cursor-default'}`} style={{color:co}}>{st}</button>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            )}


            {showCalendar&&(
                <CalendarPicker dates={dates} onSelect={handleCalendarSelect} onClose={()=>setShowCalendar(false)} calMonth={calMonth} setCalMonth={setCalMonth}/>
            )}

            <footer className="fixed bottom-0 left-0 right-0 py-2 text-center opacity-20 pointer-events-none text-[8px] font-black tracking-[0.2em]">TPAC SCHEDULE SYSTEM | V9 | 2026</footer>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>

                            <button onClick={()=>{setCalMonth({y:new Date().getFullYear(),m:new Date().getMonth()});setShowCalendar(true);}} className="ml-auto w-8 h-8 rounded-full bg-white/10 border border-white/15 flex items-center justify-center text-white/60 hover:bg-white/20 transition-all"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></button>
