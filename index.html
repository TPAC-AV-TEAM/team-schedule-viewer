<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        window.Firebase = { initializeApp, getApps, getApp, getFirestore, doc, onSnapshot, getDoc, getAuth, signInAnonymously, onAuthStateChanged };
        window.isFirebaseReady = true;
    </script>
    
    <script>
        /* ─── 穩定層 ─── */
        document.addEventListener("submit", function(e) {
            if(e.target.matches("form.prevent-reload")) e.preventDefault();
        });
        
        window.addEventListener("error", function(e){
            console.error("GlobalError:", e.message, "at", e.filename, e.lineno);
        });
        
        window.addEventListener("unhandledrejection", function(e){
            console.error("PromiseError:", e.reason);
        });
        
        document.addEventListener("wheel", function(){}, {passive:true});
        document.addEventListener("touchmove", function(){}, {passive:true});
        document.addEventListener("touchstart", function(){}, {passive:true});
        
        window.SafeStorage = {
            set: function(key, value){
                try{ localStorage.setItem(key, JSON.stringify(value)); return true; }
                catch(err){ console.warn("Storage write failed:", err); return false; }
            },
            get: function(key, def){
                try{ 
                    var value = localStorage.getItem(key);
                    return value ? JSON.parse(value) : (def !== undefined ? def : null);
                } catch(err){ return (def !== undefined ? def : null); }
            },
            remove: function(key){
                try{ localStorage.removeItem(key); return true; }
                catch(err){ return false; }
            }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        :root {
            --bg-base:   #0c0c0e;
            --bg-mid:    #111113;
            --bg-raise:  #1a1a1c;
            --bg-float:  #222224;

            --glass-inset: rgba(0,0,0,0.28);

            --border-mid:    rgba(255,255,255,0.11);

            --blue-hi: #3DA0FF;
            --blue-bg: rgba(10,132,255,0.12);
            --gt:     #FF453A; --gt-rgb: 255,69,58;

            --orange: #FF9F0A;
            --yellow: #FFD60A;

            --men-text:   #D0ECFF;

        }

        .aura-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 55% 40% at 8%  -5%,  rgba(10,132,255,0.11) 0%, transparent 100%),
                radial-gradient(ellipse 45% 35% at 92% 105%, rgba(255,55,95,0.07)  0%, transparent 100%),
                radial-gradient(ellipse 80% 70% at 50%  50%, rgba(16,16,20,0.6)    0%, transparent 100%);

        .mac-glass {
            background: var(--glass-nav); backdrop-filter: blur(48px) saturate(180%);

            50%       { border-color: rgba(255,255,255,0.80); box-shadow: 0 0 8px rgba(255,255,255,0.15); }
        }
        .b-badge-glow { animation: b-badge-pulse 2s infinite ease-in-out; border-width: 1.5px !important; }

        .master-row   { height: 50px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.045); }

        .day-block {
            background: var(--glass-card); border: 1px solid var(--border-dim); border-radius: var(--r-lg);
            padding: 14px 15px; margin-bottom: 10px;

        .mq-wrap { overflow: hidden; white-space: nowrap; position: relative; width: 100%; }
        .mq-wrap:hover .mq-run { animation-play-state: paused; }

        @keyframes mq { 0%, 15%{transform:translateX(0);} 85%, 100%{transform:translateX(-100%);} }

        @keyframes reminder-pulse {
            0%,100% { border-color: rgba(255,55,95,0.22); }
            50%      { border-color: rgba(255,55,95,0.75); }
        }
        .reminder-glow { animation: reminder-pulse 3s infinite ease-in-out; }

        .wk-GT  { background: rgba(255,69,58,0.07)  !important; border-color: rgba(255,69,58,0.20)  !important; }
        .wk-BB  { background: rgba(29,158,255,0.07) !important; border-color: rgba(29,158,255,0.20) !important; }
        .wk-GP  { background: rgba(50,215,75,0.07)  !important; border-color: rgba(50,215,75,0.20)  !important; }
        .wk-off { background: rgba(255,55,95,0.04)  !important; border-color: rgba(255,55,95,0.12)  !important; }

        .day-block-today {
    background: rgba(10, 132, 255, 0.16) !important; /* 加深底色 */
    border: 1px solid #0A84FF !important;           /* 外框加粗到 3px */
    box-shadow: 
        0 0 30px rgba(10, 132, 255, 0.5),           /* 顯著的藍色外發光 */
        0 1px 0 rgba(255, 255, 255, 0.2) inset !important;
    position: relative;
    z-index: 10;
}
        .master-today {

            border-right: 1.5px solid rgba(10,132,255,0.55) !important; z-index: 10; position: relative;
        }

        .range-input {
            background: rgba(255,255,255,0.07); border: 1px solid var(--border-mid);
            color: white; width: 60px; text-align: center; padding: 5px 4px; border-radius: var(--r-xs);
            font-weight: 700; outline: none; transition: border-color 0.18s;
        }
        .range-input:focus { border-color: var(--blue); }

        [data-tip] { position: relative; }
        @media (hover: hover) and (pointer: fine) {
            [data-tip]:hover::after {
                content: attr(data-tip); position: absolute; top: 120%; left: 50%; transform: translateX(-50%);
                background: rgba(28,28,32,0.97); color: rgba(255,255,255,0.88); border: 1px solid var(--border-mid);
                padding: 5px 11px; border-radius: var(--r-xs); font-size: 11px; font-weight: 600;
                white-space: nowrap; z-index: 10000; pointer-events: none; backdrop-filter: blur(16px);
                box-shadow: 0 6px 22px rgba(0,0,0,0.55); animation: tip-fade 0.12s ease-out forwards;
            }
        }
        @keyframes tip-fade { from { opacity:0; transform:translateX(-50%) translateY(-4px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, memo, useCallback, useRef } = React;
const APP_VERSION = 'V16.3';

const safeParse = (v, def = {}) => { try { return JSON.parse(v ?? JSON.stringify(def)); } catch(e) { return def; } };

const Icon = memo(({ name, className="w-4 h-4" }) => {
    const icons = {
        filter: <><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>,
        info:   <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
        sun:    <path d="M12 2v2m0 16v2m10-10h-2M4 12H2m15.364-7.364-1.414 1.414M7.05 16.95l-1.414 1.414M16.95 16.95l1.414 1.414M5.636 5.636l1.414 1.414M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>,
        brief:  <><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>,
        cal:    <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
        bell:   <><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
        today:  <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="12" cy="16" r="1.2"/></>,
    };
    return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
});

const TodayBtn = ({ onClick }) => (
    <button onClick={onClick} data-tip="回到今天" className="w-8 h-8 rounded-full bg-white/[0.05] border border-[var(--border-dim)] flex items-center justify-center text-[var(--blue)] hover:bg-white/12 transition-all shrink-0">
        <Icon name="today"/>
    </button>
);

const CalBtn = ({ onClick }) => (
    <button onClick={onClick} data-tip="跳轉日期" className="w-8 h-8 rounded-full bg-white/[0.05] border border-[var(--border-dim)] flex items-center justify-center text-white/50 hover:bg-white/10 transition-all shrink-0">
        <Icon name="cal"/>
    </button>
);

const VENUES = [ { id:'GT', color:'#FF453A', masterBg:'255,69,58' }, { id:'BB', color:'#1D9EFF', masterBg:'29,158,255' }, { id:'GP', color:'#32D74B', masterBg:'50,215,75' } ];
const VENUE_IDS = VENUES.map(v => v.id);
const VENUE_MAP = Object.fromEntries(VENUES.map(v => [v.id, v]));
const SHIFTS = ['A', 'B'];
const STAFF_ORDER = ["王志剛","張國飛","張劭如","謝祥玄","張懷德","楊淯舒","黎祐甄","廖俊龍","曾健洋","劉智敏"];
const STAFF_INFO = { "王志剛":{ gender:"M", type:"Normal" }, "張國飛":{ gender:"M", type:"Normal" }, "張劭如":{ gender:"F", type:"Normal" }, "謝祥玄":{ gender:"M", type:"Normal" }, "張懷德":{ gender:"M", type:"Normal" }, "楊淯舒":{ gender:"F", type:"Normal" }, "黎祐甄":{ gender:"F", type:"Normal" }, "廖俊龍":{ gender:"M", type:"Normal" }, "曾健洋":{ gender:"M", type:"Special" }, "劉智敏":{ gender:"M", type:"Special" }, };
const FIREBASE_CONFIG = { apiKey: "AIzaSyA7tgFRxDCnZpOzEvfT978wIAcqcXNZXVQ", authDomain: "team-schedule-viewer.firebaseapp.com", projectId: "team-schedule-viewer", storageBucket: "team-schedule-viewer.firebasestorage.app", messagingSenderId: "202883367260", appId: "1:202883367260:web:b31e495084a4ea8af20199" };
const APP_ID = "team-schedule-viewer";
const formatK = d => `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
const parseK = k => { const [y,m,d] = k.split('/').map(Number); return new Date(y, m-1, d); };
const staffColors = info => info && info.type==="Special" ? { text:"text-[var(--special-text)]", dot:"bg-[var(--special-dot)]" } : info && info.gender==="F" ? { text:"text-[var(--women-text)]", dot:"bg-[var(--women-dot)]" } : { text:"text-[var(--men-text)]", dot:"bg-[var(--men-dot)]" };

const StaffBtn = memo(({ name, aliasMap={}, forceName=null, onClick, mode="normal" }) => {
    const info = STAFF_INFO[name] || { gender:'M', type:'Normal' };
    const { text, dot } = staffColors(info);
    const disp = forceName || aliasMap[name] || name;
    const isLong = disp.length >= 3;
    
    const sz = mode==="tiny" ? "text-[14px] h-9" : 
               mode==="small" ? `${isLong?"text-[14px]":"text-[16px]"} h-9` : 
               mode==="master" ? "text-[16px] h-9" : 
               `${isLong?"text-[20px]":"text-[22px]"} h-12`;
               
    return ( <button onClick={e=>{e.stopPropagation();onClick&&onClick(name);}} className={`w-full ${sz} rounded-[var(--r-sm)] font-semibold border border-[var(--border-dim)] bg-[var(--glass-card)] flex items-center justify-center gap-1.5 ${text} truncate shrink-0 transition-all duration-150 hover:bg-[var(--glass-card-hover)] hover:border-[var(--border-mid)] active:scale-[0.97]`}> <span className={`w-1.5 h-1.5 rounded-full ${dot}`}></span>{disp} </button> );
});

const RangePickerModal = memo(({ onClose, currentRange, setRange }) => {
    const [cP, setCP] = useState(currentRange.past), [cF, setCF] = useState(currentRange.future);
    return ( <div className="fixed inset-0 z-[3000] flex items-center justify-center p-6 bg-black/70 backdrop-blur-sm" onClick={onClose}> <div className="animate-window bg-[var(--glass-modal)] border border-[var(--border-mid)] w-full max-w-sm rounded-[var(--r-2xl)] p-6 shadow-2xl flex flex-col gap-3" onClick={e=>e.stopPropagation()}> <h3 className="text-[18px] font-extrabold mb-2 text-center">載入範圍設定</h3> <button onClick={()=>{ setRange({type:'default',past:7,future:60}); onClose(); }} className={`w-full py-3.5 rounded-2xl border flex flex-col items-center justify-center transition-all ${currentRange.type==='default'?'bg-[var(--blue)] border-blue-400':'bg-white/5 border-white/10 hover:bg-white/10'}`}> <span className="font-bold text-[15px]">標準效能模式 (推薦)</span> </button> <button onClick={()=>{ setRange({type:'all'}); onClose(); }} className={`w-full py-3.5 rounded-2xl border flex flex-col items-center justify-center transition-all ${currentRange.type==='all'?'bg-rose-600/80 border-rose-400':'bg-white/5 border-white/10 hover:bg-rose-500/20'}`}> <span className="font-bold text-[15px]">載入全年度資料</span> </button> <div className={`mt-2 p-4 rounded-[var(--r-md)] border flex flex-col items-center gap-3 transition-all ${currentRange.type==='custom'?'border-orange-400 bg-orange-500/10':'border-white/10 bg-white/5'}`}> <span className="font-bold text-[14px]">⚙️ 自訂滑動視窗範圍</span> <div className="flex items-center gap-3"> <span>前 <input type="number" min="0" className="range-input" value={cP} onChange={e=>setCP(e.target.value)}/> 天</span> <span>後 <input type="number" min="0" className="range-input" value={cF} onChange={e=>setCF(e.target.value)}/> 天</span> </div> <button onClick={()=>{ setRange({type:'custom',past:parseInt(cP)||0,future:parseInt(cF)||0}); onClose(); }} className="w-full py-2 bg-white/10 hover:bg-white/18 rounded-[var(--r-sm)] font-bold text-[12px] transition-all">套用</button> </div> </div> </div> );
});

const CalendarPicker = memo(({ allDates, onSelect, onClose, calMonth, setCalMonth }) => {
    const dateSet = useMemo(()=>new Set(allDates.map(d=>d.fullKey)),[allDates]);
    const {y,m} = calMonth, firstDay = new Date(y,m,1).getDay(), daysInMonth = new Date(y,m+1,0).getDate(), todayK = formatK(new Date()), cells = []; 
    for(let i=0;i<firstDay;i++) cells.push(null); for(let d=1;d<=daysInMonth;d++) cells.push(d);
    return ( <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-black/40 backdrop-blur-md" onClick={onClose}> <div className="animate-window bg-[rgba(18,18,22,0.96)] border border-[var(--border-mid)] rounded-[var(--r-xl)] shadow-2xl w-full max-w-[280px] p-5" onClick={e=>e.stopPropagation()}> <div className="flex items-center justify-between mb-4"> <button onClick={()=>setCalMonth(p=>p.m===0?{y:p.y-1,m:11}:{y:p.y,m:p.m-1})} className="text-xl">‹</button> <span className="text-[15px] font-bold">{y} 年 {m+1} 月</span> <button onClick={()=>setCalMonth(p=>p.m===11?{y:p.y+1,m:0}:{y:p.y,m:p.m+1})} className="text-xl">›</button> </div> <div className="grid grid-cols-7 gap-y-1.5 gap-x-1"> {['日','一','二','三','四','五','六'].map(w=>(<div key={w} className="text-center text-[10.5px] font-semibold text-white/28 tracking-wide">{w}</div>))} {cells.map((d,i)=>{ if(!d) return <div key={"e"+i}/>; const fk=`${y}/${String(m+1).padStart(2,'0')}/${String(d).padStart(2,'0')}`, has=dateSet.has(fk), isToday=fk===todayK, isWk=(firstDay+d-1)%7===0||(firstDay+d-1)%7===6; return ( <button key={fk} disabled={!has} onClick={()=>{onSelect(fk);}} className={`h-8 w-full rounded-full text-[13px] flex items-center justify-center transition-all ${isToday?'bg-[var(--blue)] text-white':has?(isWk?'text-rose-400 hover:bg-white/10':'text-white hover:bg-white/10'):'text-white/12 cursor-default'}`}>{d}</button> ); })} </div> </div> </div> );
});

const NotesModal = memo(({ onClose, visibleDates, schedule, goDate, handleBackToday }) => {
    const today = new Date(); today.setHours(0,0,0,0);
    const notesList = visibleDates.filter(d => schedule.notes?.[d.fullKey]?.trim());
    return ( <div className="fixed inset-0 z-[3000] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm" onClick={onClose}> <div className="animate-window bg-[var(--glass-modal)] border border-[var(--border-mid)] w-full max-w-md rounded-[var(--r-2xl)] flex flex-col max-h-[85vh] overflow-hidden" onClick={e=>e.stopPropagation()}> <div className="p-3 border-b border-[var(--border-dim)] bg-white/[0.03] flex items-center justify-between"> <button onClick={onClose} className="w-8 h-8 rounded-full bg-white/[0.07] border border-[var(--border-mid)] text-white/55 hover:bg-white/15 hover:text-white/90 transition-all flex items-center justify-center text-[18px] leading-none">×</button> <h3 className="text-[16px] font-bold text-[var(--pink)]">重要提醒</h3> <TodayBtn onClick={handleBackToday}/> </div> <div id="notes-scroll-container" className="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar scroll-smooth"> {notesList.length===0 ? ( <div className="text-center text-white/40 py-10">無任何提醒事項</div> ) : notesList.map(d=>( <button key={d.fullKey} id={`note-${d.fullKey}`} onClick={() => { onClose(); setTimeout(() => goDate(d.absIdx, d.fullKey), 50); }} className={`w-full text-left p-3.5 rounded-2xl border transition-all ${parseK(d.fullKey)<today?'bg-white/[0.02] border-white/5 opacity-60':'bg-[rgba(255,55,95,0.08)] border-[rgba(255,55,95,0.2)]'}`}> <div className="text-[12px] font-bold">{d.fullKey} (週{d.w})</div> <div className="text-[14.5px] font-medium leading-relaxed">{schedule.notes[d.fullKey].split(/(?=\d+[,，])/).filter(Boolean).map((line,i)=>( <span key={i} className="block">{line.trim()}</span> ))}</div> </button> ))} </div> </div> </div> );
});

                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                    </button>
                    <button onClick={()=>setActiveModal('notes')} data-tip="重要提醒" className="w-8 h-8 rounded-full bg-white/[0.05] border border-[var(--border-dim)] flex items-center justify-center text-white/50 hover:bg-white/10 hover:text-white/80 transition-all shrink-0"> <Icon name="bell" className="w-4 h-4"/> </button>
                    <CalBtn onClick={openCal}/>
                    <button onClick={()=>setActiveModal('range')} data-tip="資料範圍" className="w-8 h-8 rounded-full bg-white/[0.05] border border-[var(--border-dim)] flex items-center justify-center text-white/50 hover:bg-white/10 hover:text-white/80 transition-all shrink-0"> <Icon name="filter" className="w-4 h-4"/> </button>
                </div>
            </header>
            <main className="flex-1 overflow-y-auto px-3.5 py-4 no-scrollbar z-10 text-left" style={{paddingBottom:'calc(7rem + env(safe-area-inset-bottom, 0px))'}}>
                <div className="mac-glass sticky top-0 -mx-3 px-3 py-3 flex flex-col mb-4 z-20 shadow-[0_8px_32px_rgba(0,0,0,0.4)] rounded-b-[20px]">
                    <div id="nav-scroll-container" className="flex gap-2.5 overflow-x-auto no-scrollbar pb-2 px-1"> {allDates.map(d=>(<button key={d.fullKey} id={`nav-${d.fullKey}`} onClick={()=>goDate(d.absIdx,d.fullKey)} className={`flex-none w-[58px] py-2.5 rounded-2xl border flex flex-col items-center justify-center transition-all duration-300 ${dateIdx===d.absIdx?'border-blue-500/50 bg-[var(--blue)] shadow-[0_4px_12px_rgba(10,132,255,0.3)] scale-105':'border-white/5 bg-white/[0.03] hover:bg-white/[0.08]'}`}> <span className={`font-bold text-[10px] mb-0.5 ${dateIdx===d.absIdx?'text-white/80':d.w==='六'||d.w==='日'?'text-[var(--pink)]':'text-white/40'}`}>週{d.w}</span> <span className={`text-[17px] font-black leading-none ${dateIdx===d.absIdx?'text-white':d.w==='六'||d.w==='日'?'text-[var(--pink)]':'text-white/70'}`}>{d.d}</span> </button>))} </div>
                    {hasNote&&( <div className="mt-3 px-1 cursor-pointer" onClick={()=>setActiveModal('notes')}> <div className="bg-[rgba(255,55,95,0.07)] border border-[rgba(255,55,95,0.22)] rounded-[var(--r-md)] px-4 py-3.5 flex items-start gap-3 reminder-glow hover:bg-[rgba(255,55,95,0.11)] transition-colors"> <span className="text-[var(--pink)] mt-0.5 shrink-0"><Icon name="info"/></span> <div> <p className="text-[9.5px] font-bold uppercase text-[var(--pink)] tracking-[0.14em] mb-1">重要提醒</p> <p className="text-[13.5px] font-medium text-white/88 leading-relaxed">{todayNote.split(/(?=\d+[,，])/).filter(Boolean).map((line,i)=>( <span key={i} className="block">{line.trim()}</span> ))}</p> </div> </div> </div> )}
                </div>
                <div className="grid gap-2.5 mb-5" style={{gridTemplateColumns:`repeat(${VENUES.length},1fr)`}}>
                    {VENUES.map(venue=>{ const sName=schedule.shows?.[curFk]?.[venue.id]||""; return ( <div key={venue.id} className="bg-[var(--glass-card)] rounded-[var(--r-lg)] overflow-hidden flex flex-col relative" style={{border:`2px solid ${venue.color}88`}}> <div className="absolute inset-0 opacity-10 pointer-events-none" style={{background:`radial-gradient(ellipse 100% 60% at 50% 0%, ${venue.color}22 0%, transparent 100%)`}}/> <button onClick={()=>handleVenueClick(venue.id)} className="py-3 font-extrabold text-[18px] tracking-tight bg-transparent border-b border-[var(--border-dim)] z-10 transition-all hover:bg-white/[0.04] active:scale-[0.98]" style={{color:venue.color}}>{venue.id}</button> <div className="px-2 py-1.5 min-h-[30px] flex items-center justify-center border-b border-[var(--border-dim)] bg-[var(--glass-inset)] text-center overflow-hidden text-[11px] font-medium text-white/50 z-10"> <div className="mq-wrap"><span className={sName.length>8?"mq-run":"truncate"}>{sName}</span></div> </div> <div className="p-1.5 space-y-1.5 z-10"> {SHIFTS.map(sh=>( <div key={sh} className="bg-[var(--glass-inset)] rounded-[var(--r-sm)] p-1.5 flex flex-col gap-1.5 min-h-[68px]" style={{border:`1.5px solid ${venue.color}44`}}> {dData?.s[venue.id][sh]?.map(n=><StaffBtn key={n} name={n} aliasMap={aliasMap} mode="small" onClick={handleStaffClick}/>)} </div> ))} </div> </div> ); })}
                </div>
                <div className="space-y-4">
                    <section className="bg-[var(--glass-card)] border border-[var(--border-dim)] rounded-[var(--r-lg)] p-4"> <h4 className="text-[var(--orange)]/80 text-[11px] font-bold uppercase tracking-[0.14em] mb-3 flex items-center gap-2"><Icon name="brief"/> 辦公人員</h4> <div className="grid grid-cols-4 gap-2.5">{dData?.s["辦公"]?.map(n=><StaffBtn key={n} name={n} aliasMap={aliasMap} mode="tiny" onClick={handleStaffClick}/>)}</div> </section>
                    <section className="bg-[var(--glass-card)] border border-[var(--border-dim)] rounded-[var(--r-lg)] p-4"> <h4 className="text-white/30 text-[11px] font-bold uppercase tracking-[0.14em] mb-3 flex items-center gap-2"><Icon name="sun"/> 今日休假</h4> <div className="grid grid-cols-4 gap-2.5">{dData?.s["休假"]?.map(n=><StaffBtn key={n} name={n} aliasMap={aliasMap} mode="tiny" onClick={handleStaffClick}/>)}</div> </section>
                </div>
            </main>
            {activeModal==='range'&&( <RangePickerModal onClose={closeModal} currentRange={rangeConfig} setRange={setRangeConfig}/> )}
            {activeModal==='notes'&&( <NotesModal onClose={closeModal} visibleDates={visibleDates} schedule={schedule} goDate={goDate} handleBackToday={handleBackToday}/> )}
            {activeModal==='master'&&( <MasterRosterModal onClose={closeModal} visibleDates={visibleDates} schedule={schedule} aliasMap={aliasMap} todayK={todayK} handleStaffClick={handleStaffClick} handleBackToday={handleBackToday} openCal={openCal}/> )}
            {(activeModal==='queryStaff'||activeModal==='queryVenue')&&( <QueryModal queryStaff={queryStaff} queryVenue={queryVenue} onClose={closeModal} setQueryStaff={name=>{ if(name){setQueryTarget(name);setActiveModal('queryStaff');} else closeModal(); }} setQueryVenue={id=>{ if(id){setQueryTarget(id);setActiveModal('queryVenue');} else closeModal(); }} visibleDates={visibleDates} schedule={schedule} aliasMap={aliasMap} curFk={curFk} handleStaffClick={handleStaffClick} handleBackToday={handleBackToday} openCal={openCal} /> )}
            {/* ⭐️ 修正 2：使用 prevModal 回到原本視窗 ⭐️ */}
            {activeModal==='calendar'&&( <CalendarPicker allDates={allDates} onSelect={fk=>{ const i=allDates.findIndex(d=>d.fullKey===fk); if(i!==-1)goDate(i,fk); if(prevModal){ setActiveModal(prevModal); setPrevModal(null); } else closeModal(); }} onClose={()=>{ if(prevModal){setActiveModal(prevModal);setPrevModal(null);} else closeModal(); }} calMonth={calMonth} setCalMonth={setCalMonth} /> )}
            <footer className="fixed bottom-0 left-0 right-0 py-2.5 flex items-center justify-center pointer-events-none text-[9px] font-semibold tracking-[0.28em] text-white/14"> <span>TPAC SCHEDULE SYSTEM | {APP_VERSION}</span> </footer>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
