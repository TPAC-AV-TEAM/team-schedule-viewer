<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>視聽班表系統 | V10.2</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        window.Firebase = { initializeApp, getApps, getApp, getFirestore, doc, onSnapshot, getDoc, getAuth, signInAnonymously, onAuthStateChanged };
        window.isFirebaseReady = true;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        :root {
            --mac-bg: #121213;
            --mac-card: rgba(44,44,46,0.6);
            --mac-card-light: rgba(58,58,60,0.5);
            --mac-blue: #0A84FF;
            --weekend-pink: #FF375F;
            --women-text: #FFD6E0; --men-text: #D6EFFF; --special-text: #FFF8D6;
            --women-dot: #FF375F;  --men-dot: #5AC8FA;  --special-dot: #FFCC00;
            --reminder-pink: #FF375F;
        }
        body { font-family:'Inter','Noto Sans TC',sans-serif; height:100vh; overflow:hidden; background:var(--mac-bg); color:#fff; -webkit-font-smoothing:antialiased; }
        .aura-bg { position:fixed; inset:0; z-index:0; pointer-events:none; background: radial-gradient(circle at 15% 0%, rgba(10,132,255,0.12) 0%, transparent 40%), radial-gradient(circle at 85% 100%, rgba(255,55,95,0.08) 0%, transparent 50%), radial-gradient(circle at 50% 50%, #1e1e1f 0%, #121213 100%); }
        .mac-glass { background:rgba(30,30,32,0.65); backdrop-filter:blur(50px) saturate(180%); border-bottom:0.5px solid rgba(255,255,255,0.08); }
        .btn-today { background:var(--mac-blue); color:white; padding:4.5px 14px; border-radius:9999px; font-size:11px; font-weight:800; }
        @keyframes b-glow-pulse { 0% { filter: drop-shadow(0 0 2px rgba(255,255,255,0.3)); } 50% { filter: drop-shadow(0 0 6px rgba(255,255,255,1)) drop-shadow(0 0 14px rgba(255,255,255,0.5)); } 100% { filter: drop-shadow(0 0 2px rgba(255,255,255,0.3)); } }
        .b-badge-glow { animation: b-glow-pulse 1.8s infinite ease-in-out; border: 1.5px solid rgba(255,255,255,0.75) !important; }
        .b-row-glow { animation: b-glow-pulse 1.8s infinite ease-in-out; outline: 1px solid rgba(255,255,255,0.65); outline-offset: -1px; }
        @keyframes reminder-pulse { 0% { filter: drop-shadow(0 0 0px rgba(255,55,95,0)); border-color:rgba(255,55,95,0.2); } 50% { filter: drop-shadow(0 0 10px rgba(255,55,95,0.4)); border-color:rgba(255,55,95,0.8); } 100% { filter: drop-shadow(0 0 0px rgba(255,55,95,0)); border-color:rgba(255,55,95,0.2); } }
        .reminder-glow { animation:reminder-pulse 3s infinite ease-in-out; border-width:1px!important; }
        .mq-wrap { overflow:hidden; white-space:nowrap; position:relative; width:100%; }
        .mq-run { display:inline-block; padding-left:100%; animation:mq 25s linear infinite; }
        @keyframes mq { 0%{transform:translateX(0);} 100%{transform:translateX(-100%);} }
        .no-scrollbar::-webkit-scrollbar { display:none; }
        .master-left-col { position:absolute; left:0; top:0; bottom:0; width:85px; z-index:50; background:rgba(30,30,32,0.85); backdrop-filter:blur(20px); border-right:1px solid rgba(255,255,255,0.12); display:flex; flex-direction:column; }
        .master-right { margin-left:85px; overflow-x:auto; overflow-y:hidden; display:block; }
        .master-cell { min-width:80px; flex-shrink:0; text-align:center; border-left:1px solid rgba(255,255,255,0.03); }
        .master-row { height:48px; display:flex; align-items:center; border-bottom:0.5px solid rgba(255,255,255,0.04); }
        .day-block { background:var(--mac-card-light); border:0.5px solid rgba(255,255,255,0.1); border-radius:1.25rem; padding:14px; margin-bottom:12px; }
        .day-block-today { border:1.5px solid var(--mac-blue)!important; background:rgba(72,72,74,0.6)!important; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, memo, useCallback } = React;

/* ══════════════════════════════════════════════════════════
   1. CENTRAL CONFIG (更新為新專案配置)
   ══════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyA7tgFRxDCnZpOzEvfT978wIAcqcXNZXVQ",
  authDomain: "team-schedule-viewer.firebaseapp.com",
  projectId: "team-schedule-viewer",
  storageBucket: "team-schedule-viewer.firebasestorage.app",
  messagingSenderId: "202883367260",
  appId: "1:202883367260:web:b31e495084a4ea8af20199"
};
const APP_ID = "team-schedule-viewer";

const VENUES = [ { id:'GT', color:'#FF3B30', masterBg:'255,59,48' }, { id:'BB', color:'#5AC8FA', masterBg:'90,200,250' }, { id:'GP', color:'#34C759', masterBg:'52,199,89' } ];
const VENUE_IDS = VENUES.map(v => v.id);
const STAFF_ORDER = ["王志剛","張國飛","張劭如","謝祥玄","張懷德","楊淯舒","黎祐甄","廖俊龍","曾健洋","劉智敏"];
const STAFF_INFO = { "王志剛":{gender:"M"}, "張國飛":{gender:"M"}, "張劭如":{gender:"F"}, "謝祥玄":{gender:"M"}, "張懷德":{gender:"M"}, "楊淯舒":{gender:"F"}, "黎祐甄":{gender:"F"}, "廖俊龍":{gender:"M"}, "曾健洋":{gender:"M",type:"Special"}, "劉智敏":{gender:"M",type:"Special"} };

/* ══════════════════════════════════════════════════════════
   2. MAIN APP
   ══════════════════════════════════════════════════════════ */
const App = () => {
    const [dates,setDates]=useState([]);
    const [schedule,setSchedule]=useState({roster:{},statuses:{},shows:{},notes:{}});
    const [dateIdx,setDateIdx]=useState(0);
    const [isUnlocked,setIsUnlocked]=useState(false);
    const [user,setUser]=useState(null);

    useEffect(()=>{
        const t=setInterval(()=>{
            if(!window.isFirebaseReady||!window.Firebase)return;
            clearInterval(t);
            const app=Firebase.getApps().length===0?Firebase.initializeApp(FIREBASE_CONFIG):Firebase.getApp();
            Firebase.signInAnonymously(Firebase.getAuth(app)).then(()=>{
                Firebase.onAuthStateChanged(Firebase.getAuth(app), u => { if(u) setUser(u); });
            });
        },200);
        return()=>clearInterval(t);
    },[]);

    useEffect(()=>{
        if(!user)return;
        const db=Firebase.getFirestore();
        return Firebase.onSnapshot(Firebase.doc(db,'artifacts',APP_ID,'public','data','rosters','master'),snap=>{
            if(!snap.exists())return;
            const data=snap.data();
            const roster=JSON.parse(data.roster||'{}'), statuses=JSON.parse(data.statuses||'{}');
            const shows=JSON.parse(data.shows||'{}'), notes=JSON.parse(data.notes||'{}');
            const keys=Object.keys(roster).sort();
            setDates(keys.map(k=>{
                const [yy,mm,dd]=k.split('/').map(Number);
                const o=new Date(yy,mm-1,dd);
                return{d:`${mm}/${dd}`,w:['日','一','二','三','四','五','六'][o.getDay()],fullKey:k};
            }));
            setSchedule({roster,statuses,shows,notes});
            setIsUnlocked(true);
        });
    },[user]);

    if(!isUnlocked) return <div className="h-screen bg-[#121213] flex items-center justify-center text-white/40 animate-pulse">CONNECTING TO NEW CLOUD...</div>;

    const curFk = dates[dateIdx]?.fullKey;
    return (
        <div className="h-screen flex flex-col overflow-hidden relative text-white bg-[var(--mac-bg)]">
            <div className="aura-bg"></div>
            <header className="mac-glass pt-12 pb-4 px-5 flex items-center justify-between shrink-0 z-50">
                <h1 className="text-[22px] font-bold">視聽班表系統 V10.2</h1>
                <button onClick={()=>window.location.reload()} className="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">↻</button>
            </header>
            <main className="flex-1 overflow-y-auto px-3 py-4 no-scrollbar z-10">
                <div className="flex gap-2 overflow-x-auto no-scrollbar mb-5">
                    {dates.map((d,idx)=>(
                        <button key={d.fullKey} onClick={()=>setDateIdx(idx)} className={`flex-none w-[58px] py-2.5 rounded-2xl border transition-all ${dateIdx===idx?'bg-[var(--mac-blue)] border-blue-400':'bg-white/5 border-white/5'}`}>
                            <span className="block text-[10px] opacity-50">週{d.w}</span>
                            <span className="text-[17px] font-black">{d.d}</span>
                        </button>
                    ))}
                </div>
                {/* 廳院資料卡片 */}
                <div className="grid grid-cols-3 gap-3">
                    {VENUES.map(v=>(
                        <div key={v.id} className="bg-[var(--mac-card)] rounded-3xl p-3 border border-white/5 text-center">
                            <div className="font-bold text-lg mb-2" style={{color:v.color}}>{v.id}</div>
                            <div className="text-[10px] text-white/40 truncate mb-2">{schedule.shows[curFk]?.[v.id]||"無演出"}</div>
                            <div className="space-y-1.5">
                                {['A','B'].map(sh=>(
                                    <div key={sh} className="bg-black/20 rounded-xl p-1.5 min-h-[40px] text-[12px]">
                                        {Object.entries(schedule.roster[curFk]?.[v.id]||{}).filter(([,val])=>val.shift===sh).map(([name])=><div key={name} className="text-blue-200">{name}</div>)}
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            </main>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
